l_english:
  RCO_new_october:0 "New October"
  RCO_new_october_desc:0 "The tense stalemate between the reactionaries and us have finally boiled over, and the people of Russia are finally clamoring for liberation. The great revolutionaries that died in the fires of the October Revolution can finally be avenged! Many in Russia call our uprising the Second October Revolution, and with the mass riots and casualties on both sides, it seems they may be right. However, the millions of patriots in Russia will not accept exploitation, and will trample upon the upper class!"
  RCO_constitution_question:0 "Adoption of a new Constitution"
  RCO_constitution_question_desc:0 "The revolution cannot live forever as a barricade committee. A new constitution will give Soviet power a legal spine, bind the workers' councils to the state, and proclaim that Russia belongs not to oligarchs, generals, or foreign creditors, but to the laboring people."
  RCO_rev_mobilization:0 "Revolutionary Mobilization"
  RCO_rev_mobilization_desc:0 "The old state mobilized men with threats and paperwork; the revolution must mobilize them with purpose. Party cells, trade unions, factory committees, and village soviets will turn scattered anger into organized strength for the civil war."
  RCO_communist_subbotniks:0 "Communist Subbotniks"
  RCO_communist_subbotniks_desc:0 "When the state lacks hands, the conscious worker gives a day to the revolution. Communist subbotniks will repair railways, clear factories, load trains, and show that socialist labor is more than a phrase."
  RCO_create_red_army:0 "Create Red Army"
  RCO_create_red_army_desc:0 "The people need an army that is not a private estate of corrupt officers or careerist generals. We will forge a new Red Army from workers, soldiers, volunteers, and loyal commanders who understand that every rifle is carried in defense of the revolution."
  RCO_create_comissars:0 "Red Commissars"
  RCO_create_comissars_desc:0 "Steel alone cannot hold an army together. Political commissars will stand beside commanders, explain the meaning of the struggle, expose defeatism, and remind every unit that discipline serves the workers' state, not the ambitions of a caste."
  RCO_maintain_discipline:0 "Maintain Discipline"
  RCO_maintain_discipline_desc:0 "A revolutionary army must be bold, but it cannot be a mob. Looting, panic, drunkenness, and private warlordism will be crushed so that the Red Army fights as the armed will of the people."
  RCO_fight_army_corruption:0 "Fight Army Corruption"
  RCO_fight_army_corruption_desc:0 "The old army rotted under theft, false reports, and officers who sold fuel while soldiers froze. We will audit depots, purge parasites, and make it clear that stealing from the front is stealing from the revolution itself."
  RCO_red_commander_academy:0 "Academy of Red Commanders"
  RCO_red_commander_academy_desc:0 "The revolution needs commanders who can read a map as well as they read history. A new academy will train officers loyal to Soviet power, disciplined in modern warfare, and free from the habits of the old military bureaucracy."
  RCO_international_brigades:0 "Interbrigades"
  RCO_international_brigades_desc:0 "The Russian Revolution is watched by workers, socialists, and anti-fascists across the world. Those willing to fight for a new October will be organized into international brigades and given a place in our common struggle."
  RCO_support_eq_mob:0 "Confiscation of Support Equipment"
  RCO_support_eq_mob_desc:0 "In a civil war, every radio, field kitchen, medical kit, and crate of tools matters. We will requisition support equipment from hoarders, corrupt depots, and abandoned stores so that revolutionary units can move and survive."
  RCO_weapons_scravenging:0 "Weapons Scavenging"
  RCO_weapons_scravenging_desc:0 "The old state left weapons scattered in police lockers, private arsenals, depots, and forgotten warehouses. We will collect every rifle and every cartridge, because a weapon left unused is a gift to counterrevolution."
  RCO_transport_confiscation:0 "Transport Requisition"
  RCO_transport_confiscation_desc:0 "The front cannot advance on slogans alone. Trucks, buses, rail stock, and civilian transport must be brought under revolutionary command so supplies, workers, and wounded soldiers can move where history demands."
  RCO_open_old_stockpiles:0 "Open old Stockpiles"
  RCO_open_old_stockpiles_desc:0 "The Soviet past still sleeps in warehouses, reserve bases, and forgotten military towns. We will break the seals, count the crates, and return old stockpiles to service in the new people's war."
  RCO_completed_red_army:0 "New Red Army"
  RCO_completed_red_army_desc:0 "The militias, detachments, volunteers, and loyal soldiers are no longer separate sparks. They are becoming one Red Army, with a single command, a single purpose, and a single oath: defend Soviet power to the end."
  RCO_seize_factories:0 "Seize means of Production"
  RCO_seize_factories_desc:0 "Factories built by generations of workers must not remain hostages of owners who flee, sabotage, or bargain with reaction. We will seize the means of production and place them under the authority of the revolutionary state."
  RCO_seize_mils:0 "Organize Military Industry"
  RCO_seize_mils_desc:0 "Military industry cannot answer to profit while the republic fights for survival. Arms plants, repair yards, and ammunition lines will be reorganized to serve the front first, the worker second, and the shareholder never."
  RCO_organize_better_factory_commitees:0 "Factory Committee System"
  RCO_organize_better_factory_commitees_desc:0 "Factory committees are the living nerve of workers' power, but enthusiasm needs structure. We will give them responsibilities, reporting channels, and authority to expose sabotage while keeping production alive."
  RCO_war_communism:0 "War Communism"
  RCO_war_communism_desc:0 "The civil war leaves no room for half measures. Food, transport, fuel, and arms must be directed by the revolutionary state, with every surplus and every workshop subordinated to victory."
  RCO_organize_transport:0 "Organise Transport System"
  RCO_organize_transport_desc:0 "Railways and roads are the arteries of Soviet power. We will bring dispatchers, railway workers, mechanics, and armed guards into one transport system capable of feeding cities and supplying fronts."
  RCO_organize_industry_agriculture_cooperation:0 "Industry-Agriculture Cooperation"
  RCO_organize_industry_agriculture_cooperation_desc:0 "The city needs bread and the village needs tools, fuel, and protection. We will rebuild the bond between industry and agriculture so that neither worker nor peasant is left alone before chaos."
  RCO_create_VSNH:0 "Establish State Bank"
  RCO_create_VSNH_desc:0 "Revolutionary economics cannot be managed through guesswork and emergency decrees alone. A central economic authority will coordinate credit, production, supply, and reconstruction in the name of the workers' state."
  RCO_strong_back:0 "Strong Rear"
  RCO_strong_back_desc:0 "A front collapses if the rear is hungry, disorganized, or afraid. We will turn the rear into a disciplined fortress of labor, rationing, repair, and political confidence."
  RCO_organize_soviet_power:0 "Organise Soviet Power"
  RCO_organize_soviet_power_desc:0 "Soviet power must be felt in every district, factory, barracks, and village. We will organize councils, committees, and executive organs so the revolution governs through institutions, not improvisation alone."
  RCO_struggle_military_and_economical:0 "Struggle military and economical"
  RCO_struggle_military_and_economical_desc:0 "The dictatorship of the proletariat is a struggle, bloody and bloodless, violent and peaceful, military and economic, pedagogical and administrative, against the forces and traditions of the old society."
  RCO_close_enemy_press:0 "Close counterrevolutionary Media"
  RCO_close_enemy_press_desc:0 "Due to a hard internal situation, we should close as soon as possible all media that are working to rebel against the Soviet power, sow panic or conduct anti-Soviet propaganda."
  RCO_factory_propaganda:0 "Factory Agitation"
  RCO_factory_propaganda_desc:0 "If the workers oppose us [the Bolsheviks], then either they do not understand something, and then our task is to explain it to them, or they are right."
  RCO_organize_worker_militia:0 "Organise Worker Militia"
  RCO_organize_worker_militia_desc:0 "In order to maintain order, it is necessary to enlist the masses, and especially all workers, to guard and patrol the streets."
  RCO_create_VCHK:0 "Restore KGB"
  RCO_create_VCHK_desc:0 "MBK is the Ministry to fight the Counter-Revolution, a new organ of the Soviet government to protect it from internal enemies. Punishing the sword of the working class, the fighting squad of the party."
  RCO_factory_arsenals:0 "Factory Arsenals"
  RCO_factory_arsenals_desc:0 "It is necessary to recreate (existed in the USSR until the end of the Second World War) system of factory arsenals. They will be controlled by factory committees and act in conjunction with local Soviets. The arming of workers is the most reliable guarantee of their rights."
  RCO_fight_counterrevolution:0 "Wealth Confiscation"
  RCO_fight_counterrevolution_desc:0 "Despite the war, in our rear there is a large number of near-bourgeois elements who have profited from military devastation and have huge values and surpluses. And this at a time when our working people devote all their forces to fight against counter-revolutionaries and foreign interventionists. It is necessary to organise general searches and seize all wealth from the bourgeois population."
  RCO_strenghtern_government:0 "Strengthen government Authority"
  RCO_strenghtern_government_desc:0 "Our state apparatus is still being created, and we need to centralise it and establish a system of subordination of local Soviets to the central Soviet government."
  RCO_help_worker_organisations:0 "Linking with workers Organizations"
  RCO_help_worker_organisations_desc:0 "There are a large number of small and medium-sized workers' organisations. Due to the economic and administrative chaos, we are not yet able to combine them into a single system, but these organisations are without a doubt the basis of Soviet power."
  RCO_new_international:0 "New Comintern"
  RCO_new_international_desc:0 "Comintern - The Communist International is an organisation that unites the working people of all countries in a joint and coordinated struggle against capital."
  RCO_unite_party:0 "Strict Party Discipline"
  RCO_unite_party_desc:0 "One of the most important tasks is to ensure the unity of the UCF and, in particular, the RCWP, as its organising core."
  RCO_struggle_bloody_and_bloodless:0 "Bloody and Bloodless"
  RCO_struggle_bloody_and_bloodless_desc:0 "The dictatorship of the proletariat is a struggle, bloody and bloodless, violent and peaceful, military and economic, pedagogical and administrative, against the forces and traditions of the old society."
  RCO_against_forces_and_traditions:0 "Against forces and traditions of old society"
  RCO_against_forces_and_traditions_desc:0 "The dictatorship of the proletariat is a struggle, bloody and bloodless, violent and peaceful, military and economic, pedagogical and administrative, against the forces and traditions of the old society."
 # post cw #
  RCO_army_development:0 "Army Development"
  RCO_army_development_desc:0 "We should continue developing the Red Army to ensure the safety of our state."
  RCO_and_in_the_sea:0 "In the Sea"
  RCO_and_in_the_sea_desc:0 "The revolution must not abandon the sea to admirals of the old order or hostile fleets. Red sailors will secure the coast, revive naval command, and carry Soviet power beyond the shoreline."
  RCO_submarine_programms:0 "Emphasize Submarines"
  RCO_submarine_programms_desc:0 "We cannot compete with developed capitalist countries in the strength of our high sea fleet, let us focus on the submarine fleet instead."
  RCO_new_naval_doctrines:0 "Naval Doctrine Development"
  RCO_new_naval_doctrines_desc:0 "Advanced military theory is essential to assume victory."
  RCO_new_dockyards:0 "Dockyards Modernization"
  RCO_new_dockyards_desc:0 "The old dockyards were starved, privatized, and left to rust. We will modernize cranes, slips, workshops, and worker housing so naval production can again serve a continental power."
  RCO_new_dockyards2:0 "Open new Dockyards"
  RCO_new_dockyards2_desc:0 "One modernized yard is not enough for a socialist fleet. New dockyards will spread production, train skilled labor, and make naval construction a permanent pillar of the planned economy."
  RCO_in_the_skies:0 "In the Skies"
  RCO_in_the_skies_desc:0 "The revolution must command the sky as well as the street. Red aviation will protect armies, factories, and cities while carrying the banner of Soviet technology into the modern age."
  RCO_new_air_doctrines:0 "Develop Air Doctrine"
  RCO_new_air_doctrines_desc:0 "Advanced military theory is essential to assume victory."
  RCO_fighter_focus:0 "Prioritise Fighters"
  RCO_fighter_focus_desc:0 "Air superiority is won by pilots in fast machines, not by speeches from headquarters. We will prioritize fighters to shield our armies and deny the enemy freedom above the front."
  RCO_academy_of_pilots:0 "Pilot Academy"
  RCO_academy_of_pilots_desc:0 "Aircraft are only as strong as the people who fly them. A new pilot academy will train disciplined aviators with technical skill, ideological confidence, and loyalty to Soviet power."
  RCO_on_the_land:0 "On the Land"
  RCO_on_the_land_desc:0 "The fate of the revolution will be decided by workers and soldiers on the land. We must rebuild doctrine, supply, command, and weapons for an army capable of both defense and liberation."
  RCO_analise_cw_experience:0 "Analyze War Experience"
  RCO_analise_cw_experience_desc:0 "We got a lot of combat experience during the last war. We should analyse it."
  RCO_weapons_development:0 "Small Arms Development"
  RCO_weapons_development_desc:0 "A people's army deserves weapons designed for modern war, not leftovers from failed reforms. We will push small arms development so every squad carries the tools of victory."
  RCO_build_defensive_lines:0 "Build Defensive Lines"
  RCO_build_defensive_lines_desc:0 "The revolution must know when to dig in. Defensive lines around vital cities and corridors will buy time, preserve industry, and turn enemy advances into exhausting bloodletting."
  RCO_new_armored_forces:0 "Armoured Fist of the Revolution"
  RCO_new_armored_forces_desc:0 "Tanks are not monuments; they are fists. A new armored force will combine steel, engines, infantry, and artillery into a weapon worthy of a revolutionary army."
  #economy
  RCO_cancel_war_communism:0 "Cancel War Communism"
  RCO_cancel_war_communism_desc:0 "With the end of the war now it is time to abolish war communism policy and start rebuilding peaceful life and socialist society."
  RCO_reorganise_VSNH:0 "Embarace Khozraschyot"
  RCO_reorganise_VSNH_desc:0 "In order to continue rebuilding socialist economy we should embarace Khozraschyot system."
  RCO_create_trusts_and_syndicates:0 "Trusts and Syndicates"
  RCO_create_trusts_and_syndicates_desc:0 "Soviet Trusts and Syndicates will allow us to advance towards socialist economy."
  RCO_industrial_investments:0 "Reindustrialization"
  RCO_industrial_investments_desc:0 "Industry is a basis of development for our country. All military. The scientific and economical efforts of our society are based on industry. It would be impossible to advance forward without establishing a developed and reliable industry."
  RCO_mass_production:0 "Mass Production"
  RCO_mass_production_desc:0 "In order to fulfil growing demand for industrial goods in our society and prevent deficit we should concentrate on mass production"
  RCO_GOSPLAN:0 "Create Gosplan"
  RCO_GOSPLAN_desc:0 "With further development of our economy we are able to make plans for our future development. Gosplan is a structure, which will create general plans for our economy."
  RCO_encourage_cooperation:0 "Encourage Cooperation"
  RCO_encourage_cooperation_desc:0 "While our industry concentrates on manufacturing common wide demand goods, small cooperatives will fulfil demand for more specialised goods."
  RCO_systemize_trusts_and_syndicates:0 "Systematize Trusts and Syndicates"
  RCO_systemize_trusts_and_syndicates_desc:0 "Further development of our economy allows us to systematise trusts and syndicates."
  RCO_relieble_economy:0 "Reliable Economy"
  RCO_relieble_economy_desc:0 "Our economy is now systematised and can be developed forward to socialism."
  RCO_encourage_shock_work:0 "Encourage Shock Work"
  RCO_encourage_shock_work_desc:0 "Great labour enthusiasm of our workers helps us in building socialism."
  RCO_systematize_workers_self_managment:0 "Systematize Workers self Management"
  RCO_systematize_workers_self_managment_desc:0 "Workers enthusiasm spreads also on managing and developing the work process of their own workplaces. factories and enterprises. This work usually goes through workers' factory committees. We can promote their efforts by making committees more influential in factory life."
  RCO_study_new_technink:0 "Embarace new Technics"
  RCO_study_new_technink_desc:0 "Now we are making our new soviet industrial machines, which are on the same level as western ones. If our workers study and learn to work on these machines, their labour efficiency will increase greatly."
  RCO_enthusiastical_society:0 "Enthusiastical Society"
  RCO_enthusiastical_society_desc:0 "Socialism doesn't suppress competition, but, on the contrary, for the first time creates the possibility of applying it on a really wide, really massive scale, really drawing the majority of the working people into the arena of such work, where they can show themselves, develop their abilities, discover talents (that are among the people - an unopened spring), which capitalism had been crushing, strangling by the thousands and millions. (Lenin)"
  RCO_encouragesocialistrealism:0 "Encourage Socialist Realism"
  RCO_encouragesocialistrealism_desc:0 "Socialist Realism is an art, which expresses the ideals of our society in a best, realistic way."
  RCO_soviet_state_militia:0 "Soviet Law Enforcement"
  RCO_soviet_state_militia_desc:0 "Order in Soviet Russia during past times was kept without needed organisation. Workers Militia patrols, MBK, Red Army and the party were meant to keep an order. Now it is time to establish a state militia (police) ministry."
  RCO_fight_nationalism:0 "Fight Nationalism"
  RCO_fight_nationalism_desc:0 "'No, we are doing the right thing by punishing nationalists of all stripes and colours so severely. They are the best helpers of our enemies and the worst enemies of their own peoples. After all, the cherished dream of the nationalists is to split the Soviet Union into separate “national” states, and then it will become an easy prey for enemies. The peoples inhabiting the Soviet Union, for the most part, will be physically exterminated, while the remaining part will turn into dumb and miserable slaves of the conquerors.' (Stalin)"
  RCO_VCHK_reorganisation:0 "Reorganize KGB"
  RCO_VCHK_reorganisation_desc:0 "The security organs must serve Soviet power, not private clans or bureaucratic self-preservation. Reorganization will restore discipline, political reliability, and the capacity to strike at enemies of the revolution."
  RCO_new_soviet_cinema:0 "New Soviet Cinema"
  RCO_new_soviet_cinema_desc:0 "Old Soviet Cinema is in memory of all post Soviet people as a kind, interesting and professional product, which was promoting the best traits of characters in Soviet people. Russian 90ies cinema was quite specific but still gave some great films to the public. We should promote the ideals of old Soviet cinema and unite them with the best traits of Russian cinema."
  RCO_new_constitution:0 "The UCF Question"
  RCO_new_constitution_desc:0 "Our country cannot be ruled by people and political groups with different views on its future. While the coalition was possible during Putin's coup and civil war. Now it is time to decide the future of UCF."
  #POPOV
  RCO_surrounded_with_glory_soldered_by_will:0 "Surrounded by Glory Soldered by Will"
  RCO_surrounded_with_glory_soldered_by_will_desc:0 "Our communist party, RCWP, is the party which led us to this revolution through unknown times of  90ies Russia, Putin's reactionary coup and hard civil war times. Now thanks to RCWP efforts, the red sun of freedom is shining over our people and times of capitalist exploitation are gone, this time once and for all."
  RCO_lenins_state_policy:0 "Lenin's State Policy"
  RCO_lenins_state_policy_desc:0 ""
  RCO_secure_soviet_proletarian_democracy:0 "Secure Soviet Proletarian Democracy"
  RCO_secure_soviet_proletarian_democracy_desc:0 "Soviet Democracy is an essential part of our state."
  RCO_return_party_maximum:0 "Party Maximum Policy"
  RCO_return_party_maximum_desc:0 "Partmaximum is a policy, which aims at cleaning the party from different careerists, who joined us just to promote their place in the society. Partmaximum means that all party members, whose salary is above the salary level of an average worker specialist, give half their salary to the party treasury."
  RCO_encourage_education:0 "Promote Education"
  RCO_encourage_education_desc:0 "'Study, study and one more time study!\nYou can become a communist only when you enrich your memory with the knowledge of all the riches that humanity has developed.'' (Lenin)"
  RCO_party_is_a_part_of_society:0 "Party is a Part of the Society"
  RCO_party_is_a_part_of_society_desc:0 "Party relies on the working masses. All structures of the society: factories, army detachments, Soviets, - are influenced by the party. Through its influence the party guides the society to communism. Not by force but by conviction."
  RCO_state_of_proletarian_dictatorship:0 "Proletarian Dictatorship"
  RCO_state_of_proletarian_dictatorship_desc:0 "'Proletarian Dictatorship means that only proletariat, specifically urban factory workers, are able to lead the masses of exploitation toilets in a struggle against capitalism' (lenin)"
  RCO_lenins_economic_policy:0 "Lenin's Economic Policy"
  RCO_lenins_economic_policy_desc:0 ""
  RCO_weaken_capitalist_production:0 "Weaken capitalist production in the Economy"
  RCO_weaken_capitalist_production_desc:0 "Our economy is not fully communal yet. Some elements of the capitalist production system still remain in our economy and the main way we can solve this issue is to continue increasing planning in our economy."
  RCO_develop_agroindustry:0 "Develop Agro-industry"
  RCO_develop_agroindustry_desc:0 "Our agriculture is to be based on modern agro-industrial methods. We can collectivise agriculture the same as we did to industry by promoting the Sovkhoz system."
  RCO_reorient_to_labour_economy:0 "Reorient to labour Economy"
  RCO_reorient_to_labour_economy_desc:0 "One of main points of modern Russian leninism was the theory that  in communist and socialist economy the amount of labour spent on the production of an industrial good should be the main economy efficiency indicator."
  RCO_price_reduction_system:0 "Price Reduction System"
  RCO_price_reduction_system_desc:0 "System of continuous reduction of prices is an essential part of our economy. It helps to strengthen the national currency and increase people's living standards."
  RCO_great_works_plan:0 "Great Works Plan"
  RCO_great_works_plan_desc:0 "Nature can be changed according to people's intelligence."
  RCO_economy_of_proletarian_dictatorship:0 "Economy of proletarian Dictatorship"
  RCO_economy_of_proletarian_dictatorship_desc:0 ""
  RCO_lifebecameeasier_lifebecamemorehappy:0 "Great Ancestors"
  RCO_lifebecameeasier_lifebecamemorehappy_desc:0 "'We are standing on the shoulders of giants.'(Lenin)"
  RCO_ussr_restored:0 "Soviet Union Reborn"
  RCO_ussr_restored_desc:0 "The red banner rises again over a state that claims the inheritance of October, victory, labor, and sacrifice. The Soviet Union is reborn not as memory, but as a renewed project of power."
  RCO_embarace_five_year_system:0 "Five Year Plans"
  RCO_embarace_five_year_system_desc:0 "Our planning capabilities are now so advanced that we are able to make long term general plans. This system will greatly improve our economy."
  RCO_first_steps_to_abolishing_money:0 "First Steps to Abolishing Money"
  RCO_first_steps_to_abolishing_money_desc:0 "'There can be nothing more erroneous and absurd than to assume, on the basis of exchange value and money, the control of the united individuals over their total production.'' (Marx)"
  RCO_total_khozraschyot:0 "Price Reduction System"
  RCO_total_khozraschyot_desc:0 "Prices must serve planning, not speculation. A renewed system of economic accountability will reduce waste, discipline enterprises, and connect production targets to real material results."
  RCO_improve_worker_designer_cooperation:0 "Worker-Designer Cooperation"
  RCO_improve_worker_designer_cooperation_desc:0 "COoperation between workers and designers should be brought to another, higher level in our society."
  RCO_communist_attitude_to_labour_movement:0 "Communist Attitude to Labour Movement"
  RCO_communist_attitude_to_labour_movement_desc:0 ""
  RCO_widespread_experience_exchange:0 "Widespread Experience Exchange"
  RCO_widespread_experience_exchange_desc:0 ""
  RCO_develop_moral_poochrenie:0 "Moral Encouragement"
  RCO_develop_moral_poochrenie_desc:0 "System of moral encouragement relies on a high level of public conscientiousness. The objects of moral encouragement are, for example, labour banners, which are given to the victors in a socialist competition. The honour to get and keep such banners is more important than money or other social preferences."
  RCO_great_patriotic_war:0 "Second Great Patriotic War"
  RCO_great_patriotic_war_desc:0 "Capitalists dared to invade our country again."
  RCO_soviet_mobilization:0 "Soviet Mobilisation"
  RCO_soviet_mobilization_desc:0 "Our society is not turned into a united military camp, where everyone does his part to achieve a common goal - victory."
  RCO_dhuhsotniks:0 "Dhuhsotniks"
  RCO_dhuhsotniks_desc:0 "Dhuhsotniks (two hundredists) is a movement of workers, who manages to complete 200 percent of a production plan, either by hard work or by implementing innovative production methods."
  RCO_tyasyachniks:0 "Tyasyachniks"
  RCO_tyasyachniks_desc:0 "1000 percent plan."
  RCO_emergency_industry_conversation:0 "Emergency Industry Conversion"
  RCO_emergency_industry_conversation_desc:0 ""
  RCO_motherland_isin_danger:0 "Motherland is in Danger"
  RCO_motherland_isin_danger_desc:0 "When the motherland is in danger, hesitation becomes treason to the future. We will call workers, soldiers, engineers, and peasants to defend the revolution with everything they have."
  RCO_never_again:0 "Never again Slaves"
  RCO_never_again_desc:0 "Never again will our people be slaves to oligarchs, foreign capital, or armies marching under anti-Soviet banners. This oath will harden the state and the front alike."
  RCO_ourlastoffensive:0 "Our last Offensive"
  RCO_ourlastoffensive_desc:0 "There comes a moment when defense must become decision. Our last offensive will gather reserves, industry, and political will into one final blow against the enemies of Soviet power."
  RCO_scientific_shock_work:0 "Closed Cities Network"
  RCO_scientific_shock_work_desc:0 "Closed cities once carried the secrets of Soviet science. We will revive that network, protect its specialists, and turn scientific shock work into a weapon of state survival."
  RCO_siberian_resource_scravenging:0 "Siberian Resources Scravenging"
  RCO_siberian_resource_scravenging_desc:0 "Siberia holds the material depth of the revolution: timber, ore, fuel, and space. We will extract what is needed, build what is missing, and feed industry from the eastern reserve."
  RCO_create_office_workers_soviets:0 "Office Workers Soviets"
  RCO_create_office_workers_soviets_desc:0 ""
  RCO_better_work_more_free_time:0 "Better work - More free time"
  RCO_better_work_more_free_time_desc:0 "Those who work better and complete plans in a shorter term can spend extra working hours as free time."
  RCO_strengtern_rabkrin_power:0 "Workers Inspection"
  RCO_strengtern_rabkrin_power_desc:0 "We should give more rights to the Workers Inspection Organization, which allows ordinary workers to inspect the work of bureaucrats."
  RCO_social_programms:0 "Social Programs"
  RCO_social_programms_desc:0 "The revolution must prove that it can protect as well as command. Social programs will support workers, families, veterans, and the poor so Soviet power is felt in daily life, not only in slogans."
  RCO_everyone_must_be_beurocrat:0 "Everyone must be Bureaucrat"
  RCO_everyone_must_be_beurocrat_desc:0 "'If everyone would be a bureaucrat, nobody would be a bureaucrat.' (Lenin)"
  RCO_widespread_vseobuch:0 "Widespread VseVObuch"
  RCO_widespread_vseobuch_desc:0 "VseVObuch (universal military training) is aimed to teach most Soviet citizens how to defend the Motherland in case of war."
  RCO_politruks_instead_comissars:0 "Politruks instead Comissars"
  RCO_politruks_instead_comissars_desc:0 "The old commissar model must adapt to modern units. Political officers will work inside the army as educators, organizers, and morale-builders rather than mere inspectors with red armbands."
  RCO_improve_logistics:0 "Improve Logistics"
  RCO_improve_logistics_desc:0 "No revolutionary offensive survives without fuel, shells, food, and spare parts. Logistics will be treated as a front of its own, where order and planning defeat chaos before the enemy is even seen."
  RCO_partisan_warfare_tactics:0 "New Soviet Army"
  RCO_partisan_warfare_tactics_desc:0 "Russia remembers forests, rail sabotage, hidden depots, and people's vengeance. Partisan warfare tactics will give our forces the ability to bleed stronger enemies and turn occupation into a nightmare."
  RCO_develop_artillery:0 "Focus on Artillery"
  RCO_develop_artillery_desc:0 "Artillery is the voice of the revolution when diplomacy fails. By improving guns, rockets, targeting, and ammunition supply, we will make every offensive begin with thunder."
  RCO_develop_motostrelki:0 "Focus on Mechanized"
  RCO_develop_motostrelki_desc:0 "Motor rifle troops are the backbone of a modern Soviet army. We will develop mechanized formations that can move quickly, hold ground, and carry socialist firepower across vast distances."
  RCO_attack_capitalism:0 "Attack Capitalism"
  RCO_attack_capitalism_desc:0 ""
  RCO_strengthern_workplace_organization:0 "Improve Workplace Organization"
  RCO_strengthern_workplace_organization_desc:0 ""
  RCO_naz_leadership_question:0 "National-Bolshevik Triumph"
  RCO_naz_leadership_question_desc:0 "The National-Bolshevik current has forced its way to the center of power, fusing red symbolism with iron nationalism. The leadership question must be settled before the movement devours itself."
  RCO_naz_invest_in_minprom:0 "Invest in Minprom"
  RCO_naz_invest_in_minprom_desc:0 "Industry is the material body of sovereignty. Investment in Minprom will revive heavy production, machine tools, and the industrial ministries needed for an independent socialist power."
  RCO_naz_open_soviet_stockpiles:0 "Open Soviet Stockpiles"
  RCO_naz_open_soviet_stockpiles_desc:0 "The ruins of the old Union still contain weapons, parts, uniforms, and machines. We will open Soviet stockpiles and return forgotten reserves to the struggle."
  RCO_naz_autarky:0 "Strive for Autarky"
  RCO_naz_autarky_desc:0 "Dependence is a chain, whether held by bankers, exporters, or foreign states. Autarky will demand sacrifice, but it will free the revolution from the blackmail of outside markets."
  RCO_naz_empire:0 "Soviet Empire"
  RCO_naz_empire_desc:0 "The old empire collapsed because it lost its mission. A Soviet empire will be justified not by dynasties or capital, but by the unity of peoples under a disciplined revolutionary state."
  RCO_naz_vpk_workers_union:0 "Union of Military Industry Workers"
  RCO_naz_vpk_workers_union_desc:0 "The military-industrial worker must become a political force, not a silent hand at a machine. A union of defense workers will bind labor, arms production, and state strategy together."
  RCO_naz_invest_in_milindustry:0 "Invest in Military Industry"
  RCO_naz_invest_in_milindustry_desc:0 "Military industry must expand before the next war is upon us. New lines, rebuilt plants, and trained workers will ensure that the army never waits helplessly for weapons."
  RCO_naz_labour_conscription:0 "Conscription of Labour Force"
  RCO_naz_labour_conscription_desc:0 "When the state fights for survival, labor becomes a duty as serious as military service. We will direct manpower toward vital industry, construction, and defense work."
  RCO_naz_reorganize_arnaments_production:0 "Reorganize Arnaments Production"
  RCO_naz_reorganize_arnaments_production_desc:0 "Arms production has been scattered by corruption, emergency orders, and broken supply chains. We will reorganize it under unified planning so every factory knows its task."
  RCO_naz_patriotic_education:0 "Patriotic Education"
  RCO_naz_patriotic_education_desc:0 "The classroom must teach more than formulas and dates. Patriotic education will raise a generation that understands discipline, labor, sacrifice, and the historic mission of the Soviet state."
  RCO_naz_prohibit_abortions:0 "Prohibit Abortions"
  RCO_naz_prohibit_abortions_desc:0 "The state sees demography as a front of national survival. This policy will be presented as protection of the future, binding family policy to the demands of a mobilized society."
  RCO_naz_gosapparat_activization:0 "Activization of State apparatus"
  RCO_naz_gosapparat_activization_desc:0 "A passive bureaucracy is counterrevolution by another name. The state apparatus will be activated, inspected, and forced to carry out orders with revolutionary speed."
  RCO_naz_military_comissariats:0 "Military Comissariats"
  RCO_naz_military_comissariats_desc:0 "Military commissariats must become more than dusty offices. They will register manpower, organize call-ups, support families, and connect the army to every district of the country."
  RCO_naz_russian_army:0 "Russian Army"
  RCO_naz_russian_army_desc:0 "The army will be rebuilt as the armed body of the nation and the revolution. Its officers must obey the state, its soldiers must trust their mission, and its enemies must fear its return."
  RCO_naz_nazbaty:0 "National Battalions"
  RCO_naz_nazbaty_desc:0 "National battalions will channel militant energy into units controlled by the state. Their loyalty will be tested at the front, where slogans must become discipline under fire."
  RCO_naz_faith_in_supreme_commander:0 "Faith in Supreme Commander"
  RCO_naz_faith_in_supreme_commander_desc:0 "A mobilized state needs a single command image to steady the masses and the army. Faith in the supreme commander will be cultivated as a symbol of unity, obedience, and final victory."
  RCO_naz_terroborona:0 "Territorial Defence System"
  RCO_naz_terroborona_desc:0 "Territorial defense will make every region responsible for its own security. Workers, veterans, and local authorities will prepare to defend factories, bridges, and towns against sabotage or invasion."
  RCO_naz_unitary_state:0 "Unitary State"
  RCO_naz_unitary_state_desc:0 "Fragmentation nearly destroyed Russia. A unitary state will break feudal privileges, regional bargaining, and bureaucratic separatism in favor of one revolutionary center."
  RCO_naz_ekb_capital:0 "Move capital to Ekaterinburg"
  RCO_naz_ekb_capital_desc:0 "Ekaterinburg is a city of industry, revolution, and continental depth. Moving the capital there will signal a break with old Moscow intrigue and a turn toward the workers of the Urals."
  RCO_naz_revolutionary_spirit:0 "Revolutionary Spirit"
  RCO_naz_revolutionary_spirit_desc:0 "No state can survive on police and decrees alone. Revolutionary spirit must be rekindled in the streets, schools, barracks, and factories so the people believe history is moving again."
  RCO_naz_military_beurocracy:0 "New Military Beurocracy"
  RCO_naz_military_beurocracy_desc:0 "The military bureaucracy must be remade, not merely expanded. Staff work, procurement, mobilization, and command reporting will be reorganized into a system that serves war rather than paperwork."
  RCO_naz_laf_enforcement:0 "Arrest terrorists"
  RCO_naz_laf_enforcement_desc:0 "Armed extremists, terrorist cells, and separatist gangs will be treated as enemies of the state. Revolutionary legality will be harsh, but it will be directed against those who threaten national survival."
  RCO_naz_reform_kgb:0 "Reform KGB"
  RCO_naz_reform_kgb_desc:0 "The security service must be remade into a blade that answers to the new revolutionary state. Informers, analysts, and field officers will be reorganized for ideological discipline and operational reach."
  #
  RCO_carriers_programms:0 "Carrier Programms"
  RCO_carriers_programms_desc:0 "A great power cannot look at the oceans through borrowed eyes. Carrier development will be costly, but it will give the reborn Soviet state reach, prestige, and protection for distant operations."
  RCO_escort_ships:0 "Escort Ships"
  RCO_escort_ships_desc:0 "Convoys, troopships, and coastal routes need guardians. Escort ships are not glamorous, but they are the quiet shield that keeps supplies moving and sailors alive."
  RCO_submarine_innovative:0 "Innovative Submarines"
  RCO_submarine_innovative_desc:0 "A weaker fleet must strike intelligently. Submarine innovation will let us threaten enemy shipping, defend our waters, and prove that socialist engineering can make steel disappear beneath the waves."
  RCO_restore_soviet_bombers:0 "Focus on Bombers"
  RCO_restore_soviet_bombers_desc:0 "The Soviet bomber tradition must be restored for a new era. Long-range aviation will remind every enemy that distance does not protect those who threaten the revolution."
  RCO_new_fighters:0 "New Fighters"
  RCO_new_fighters_desc:0 "Enemy bombers and drones will not be stopped by nostalgia. New fighters will give our pilots the machines they need to contest the air and defend the workers' republic."
  RCO_new_drones:0 "Develop Drones"
  RCO_new_drones_desc:0 "The battlefield is changing, and the people's army must not fight blind. Drones will give commanders eyes over the front and allow factories to produce cheap tools of reconnaissance and strike."
  RCO_standard_air_training:0 "Focus on Quantity"
  RCO_standard_air_training_desc:0 "The war demands many pilots, not only a handful of heroes. Standardized air training will produce reliable crews quickly and give the Red Air Force depth."
  RCO_focus_on_civilian:0 "Focus on Civilian Industry"
  RCO_focus_on_civilian_desc:0 "Socialism is not only rifles and trenches. Civilian industry must be rebuilt so workers have housing, tools, power, and the economic foundation needed for a durable Soviet state."
  RCO_focus_on_military:0 "Rearnamnet Programm"
  RCO_focus_on_military_desc:0 "The enemy will not wait for our economy to mature. A rearmament program will concentrate steel, labor, and planning on the weapons needed to defend the revolution now."
  RCO_purge_political_opponents:0 "Poltical Purge"
  RCO_purge_political_opponents_desc:0 "Counterrevolution does not always wear a uniform. We will remove hostile officials, conspirators, saboteurs, and professional traitors before they can turn the state against the workers."
  RCO_eastern_direction:0 "Eastern Direction"
  RCO_eastern_direction_desc:0 "The East offers partners who understand pressure from the old capitalist centers. We will turn our attention toward Asia, where trade, security, and ideology can open new roads for Soviet diplomacy."
  RCO_contact_north_korea:0 "Contact North Korea"
  RCO_contact_north_korea_desc:0 "North Korea stands as a harsh survivor of socialist isolation. Contact with Pyongyang can bring military cooperation, political symbolism, and another crack in the wall of Western pressure."
  RCO_mutal_defence_china:0 "Mutual Guarantees with PRC"
  RCO_mutal_defence_china_desc:0 "China is too important to treat as a distant observer. Mutual guarantees with the PRC would anchor our eastern flank and show that the socialist world can still coordinate against common threats."
  RCO_japanese_question:0 "Japaneese Question"
  RCO_japanese_question_desc:0 "Japan remains tied to the American order and to unresolved questions in the Far East. We must decide whether pressure, negotiation, or force will settle the Japanese question."
  RCO_southern_direction:0 "Southern Direction"
  RCO_southern_direction_desc:0 "The southern frontier is a corridor of resources, instability, and historic Soviet influence. We will return there with diplomacy, pressure, infrastructure, and if necessary, arms."
  RCO_kazah_question:0 "Kazahstan Question"
  RCO_kazah_question_desc:0 "Kazakhstan sits across the steppe like a gate to Central Asia and Siberia. Its future cannot be left to foreign influence, nationalist drift, or anti-Soviet calculation."
  RCO_subdue_middle_asia:0 "Return to Central Asia"
  RCO_subdue_middle_asia_desc:0 "Central Asia was once tied to us by factories, railways, schools, and shared security. We will restore that sphere, offering order to friends and ultimatums to those who invite our enemies."
  RCO_new_southern_thrust:0 "Southern Thrust"
  RCO_new_southern_thrust_desc:0 "The southern thrust will combine military roads, political pressure, and revolutionary confidence. The Caucasus and beyond must understand that Soviet power has returned to the mountains."
  RCO_return_abhazia:0 "Abkhazia and Osetia Question"
  RCO_return_abhazia_desc:0 "Abkhazia and Ossetia are not bargaining chips for hostile governments. We will protect friendly forces there and use the question to break the influence of anti-Soviet regimes in the Caucasus."
  RCO_prepare_southern_infra:0 "Prepare Infrastructure"
  RCO_prepare_southern_infra_desc:0 "Armies cannot cross mountains on speeches. Roads, depots, rail links, and repair bases must be prepared before the southern direction can become a real strategic option."
  RCO_return_to_caucasus:0 "Return to Caucasus"
  RCO_return_to_caucasus_desc:0 "The Caucasus has always been a test of state strength. We will return with Soviet authority, offering stability to loyal peoples and pressure to those who serve hostile powers."
  RCO_prepare_march_west:0 "Prepare to march West"
  RCO_prepare_march_west_desc:0 "The western march must be prepared in rail yards, fuel depots, command maps, and diplomatic warnings before it begins on the battlefield. We will build the means before giving the order."
  RCO_influence_baltic:0 "Influence Baltics"
  RCO_influence_baltic_desc:0 "The Baltic states sit on the edge of our security zone and inside the Western imagination. Influence operations will test their governments, workers, minorities, and elites before harder decisions are made."
  RCO_attack_baltic:0 "Attack Baltics"
  RCO_attack_baltic_desc:0 "If influence fails, force will speak. The Baltic question will be settled by arms, and the western border will be pushed away from the heart of the Soviet state."
  RCO_ultimatum_to_moldova:0 "Ultimatum to Moldova"
  RCO_ultimatum_to_moldova_desc:0 "Moldova cannot be allowed to become a permanent breach in our southwestern security. An ultimatum will offer a final chance for settlement before revolutionary power imposes its own answer."
  RCO_demand_rightful_territory:0 "Demand our rightful Territory"
  RCO_demand_rightful_territory_desc:0 "History left borders twisted by collapse, panic, and foreign interference. We will demand rightful territory and make clear that the era of Soviet retreat is over."
  RCO_restore_trade:0 "Restore Trade Links"
  RCO_restore_trade_desc:0 "Even a revolutionary state must trade, bargain, and obtain what its factories cannot yet produce. Restored trade links will help stabilize the economy without surrendering political independence."
  RCO_trade_with_india:0 "Trade with India"
  RCO_trade_with_india_desc:0 "India offers markets, technology, and a partner beyond the Western bloc. Trade with Delhi can widen our diplomatic field and bring breathing room to Soviet industry."
  RCO_trade_with_china:0 "Trade with China"
  RCO_trade_with_china_desc:0 "China's industrial weight can help break isolation. Trade with Beijing will provide machines, components, and strategic depth while binding two great Eurasian powers closer together."
  RCO_trade_with_europe:0 "Trade with Europe"
  RCO_trade_with_europe_desc:0 "Europe may condemn us in speeches while needing energy, raw materials, and markets. We will reopen trade where interests overcome ideology and exploit every division among our opponents."
  RCO_new_genue_conference:0 "Solve Embargo Problem"
  RCO_new_genue_conference_desc:0 "The embargo cannot be solved by waiting for pity. A new Genoa-style conference will confront our enemies with reality: Soviet Russia is too large, too armed, and too necessary to ignore."
  RCO_autarky:0 "Emphasize Autarky"
  RCO_autarky_desc:0 "If the world closes its markets, we will build our own. Autarky means domestic substitutes, planned allocation, and the refusal to let sanctions decide the fate of socialism."
  RCO_prioritize_trade:0 "Prioritize Trade"
  RCO_prioritize_trade_desc:0 "Isolation can become a prison if ideology forgets material needs. We will prioritize trade where it strengthens the revolution, feeds industry, and brings technology without political surrender."
  RCO_land_research_fac:0 "Kirov Research Center"
  RCO_land_research_fac_desc:0 "The Kirov research center will bind scientists to the needs of the front. Armor, artillery, communications, and battlefield electronics will be studied as one system of socialist war."
  RCO_wagner_interbrigade:0 "Wagner InterBrigade"
  RCO_wagner_interbrigade_desc:0 "Some fighters of the old order can be turned against reaction if placed under revolutionary command. The Wagner interbrigade will be stripped of private ambition and forced into service as a hard instrument of the front."
  RCO_air_res_fac:0 "Air Research Facility"
  RCO_air_res_fac_desc:0 "Aviation advances through laboratories before it reaches the runway. A dedicated research facility will unite engineers, pilots, and planners in the service of socialist air power."
  RCO_def_stalingrad:0 "Defence of Stalingrad"
  RCO_def_stalingrad_desc:0 "Stalingrad is more than a city; it is a command to endure. We will fortify it as a symbol and a fortress, ready to make any enemy pay for every street."
  RCO_def_moscow:0 "Defence of Moscow"
  RCO_def_moscow_desc:0 "Moscow is the nerve center of the state and the memory of past victories. Its defenses will be organized so that no reactionary army can dream of taking the capital cheaply."
  RCO_def_leningrad:0 "Defence of Leningrad"
  RCO_def_leningrad_desc:0 "Leningrad remembers blockade, hunger, and defiance. We will prepare the city again, not out of despair, but to show that Soviet power does not abandon its historic strongholds."
  RCO_road_of_life:0 "Road of Life"
  RCO_road_of_life_desc:0 "If the city is threatened, supply must continue by road, rail, water, and sacrifice. The Road of Life will be planned before crisis strikes, so endurance is not left to improvisation."
  RCO_merge_factions_china:0 "Merge Factions with China"
  RCO_merge_factions_china_desc:0 "Separate camps can be divided; a united bloc must be reckoned with. By merging factions with China, we can turn parallel struggles into a single strategic front."
  RCO_RO_CPRF_desc:0 "The party has survived defeat, humiliation, factional quarrels and the long winter of capitalist restoration. Now the CPRF must cease being a memory of Soviet power and become its living instrument once again: disciplined enough to govern, patient enough to persuade, and bold enough to return the working people to the centre of Russian history."
  RCO_RO_Form_Triumvirate_desc:0 "No single current can rebuild socialism alone. The old party apparatus, the patriotic left and the practical organisers of the labour movement must be tied into a common command, not by empty slogans, but by responsibility before the people. A triumvirate will steady the revolution while the state learns again how to serve workers instead of owners."
  RCO_RO_First_steps_socialism_desc:0 "Socialism cannot be restored by decree alone; it must enter factories, schools, barracks and municipal offices as daily authority. The first measures will be cautious where caution preserves production, and uncompromising where private greed threatens the new republic. The people must feel that the red flag has returned not as decoration, but as protection."
  RCO_RO_develop_service_sector_desc:0 "A socialist economy must not treat daily life as an afterthought. Transport offices, repair shops, clinics, trade networks and public services are the arteries through which confidence in the new order will flow. By developing the service sector under public oversight, we show that socialism means bread, dignity and functioning streets, not merely speeches from tribunes."
  RCO_RO_Unite_AKM_LF_desc:0 "The militant youth, the labour front and the veterans of street struggle have too often marched separately beneath similar banners. Their anger must be forged into organisation, their romanticism disciplined by political purpose. United, they will become not a crowd outside power, but a cadre reserve for socialist reconstruction."
  RCO_RO_revival_of_russia_desc:0 "Russia will not be revived by oligarchs selling her soil or liberals begging for approval abroad. Her renewal lies in the worker, the engineer, the teacher, the soldier and the peasant who know that the Motherland is strongest when it belongs to its people. Socialist patriotism will bind national dignity to social justice once again."
  RCO_RO_alliance_with_comrades_desc:0 "Every communist current carries part of the truth and part of the scars of defeat. We must gather those willing to build, argue honestly and submit factional pride to the needs of the revolution. An alliance of comrades will turn scattered red islands into a mainland of power."
  RCO_RO_intelligentsia_desc:0 "The socialist state needs more than loyal slogans; it needs mathematicians, doctors, planners, teachers, programmers, writers and engineers who believe their labour serves the people. The intelligentsia must be invited back into the national project, not as servants of capital, but as conscious builders of a humane and modern socialism."
  RCO_RO_progressive_tax_desc:0 "Those who grew rich while factories died and villages emptied will now contribute to the recovery of the country they exploited. A progressive tax is not revenge; it is elementary justice. The burden of reconstruction must fall heaviest on those whose fortunes were built from the labour of others."
  RCO_RO_NEM_desc:0 "The New Economic Mechanism will give the country breathing space without surrendering the commanding heights. Limited initiative, cooperative enterprise and local flexibility can serve socialism if the state keeps its hand on finance, heavy industry and strategic planning. We will use the market as a tool, not kneel before it as a god."
  RCO_RO_promote_small_business_desc:0 "Not every workshop, cafe, repair brigade or family enterprise is an enemy of socialism. Under clear rules and fair taxation, small business can fill gaps that bureaucracy handles poorly while the great levers of the economy remain public. Let useful initiative work for the people rather than against them."
  RCO_RO_Just_dont_fear_desc:0 "The people have heard too many promises followed by queues, closures and police batons. We must speak plainly: socialist renewal will be firm, but it will not mean chaos in every shop and office. If citizens do not fear tomorrow, they will give the revolution the time it needs to prove itself."
  RCO_RO_unite_banks_desc:0 "Credit decides what is built, who works and which regions are abandoned. Such power cannot remain scattered among private interests and speculative clans. By uniting the banks under public direction, we turn finance from a casino into a planning instrument for industry, housing and national development."
  RCO_RO_stable_prices_desc:0 "A worker cannot plan a household budget if prices move like artillery fire. Stable prices are a social promise: wages must buy bread, medicine, transport and warmth, not anxiety. The state will discipline profiteers, secure supply chains and prove that socialism brings order to the market's panic."
  RCO_RO_state_planning_com_desc:0 "Planning failed when it became blind paperwork, but the absence of planning surrendered the country to thieves. A new State Planning Committee will use modern data, regional consultation and industrial priorities to coordinate growth. The plan must become a living map of socialist development, not a museum relic."
  RCO_RO_new_komsol_desc:0 "A revolution without youth is a speech without a future. The new Komsomol will bring students, young workers and volunteers into construction brigades, cultural work, technical education and civic defence. It will teach discipline without cynicism and patriotism without hatred."
  RCO_RO_revive_kolhozes_desc:0 "The countryside cannot be saved by nostalgia alone, but neither can it survive as a hunting ground for agro-holdings and absentee owners. Revived collective farms will combine cooperative traditions with modern machinery, guaranteed procurement and local democracy, giving rural Russia a stake in the socialist future."
  RCO_RO_support_rural_areas_desc:0 "A village without roads, doctors, schools and reliable work becomes a wound in the body of the nation. Supporting rural areas is not charity; it is national repair. The red state must reach beyond the capitals and prove that every settlement belongs to the republic."
  RCO_RO_ethnic_govs_desc:0 "The Soviet idea was strongest when it promised equality between peoples without dissolving them into suspicion. Ethnic republics and local governments must be drawn into socialist renewal through rights, investment and representation. Unity will be built by justice, not by pretending that difference does not exist."
  RCO_RO_new_industrialisation_desc:0 "Russia cannot live forever from pipelines, imports and the ruins of Soviet factories. A new industrialisation will raise machine tools, chemical plants, electronics workshops and steel halls where speculation once ruled. The worker's republic must again become a country that makes the future with its own hands."
  RCO_RO_peoples_communes_desc:0 "The commune is not merely an administrative unit; it is the school of socialist citizenship. Local labour collectives, residents and councils will be given real responsibility for housing, services and production initiatives. Power must descend from marble offices into courtyards, workshops and meeting halls."
  RCO_RO_communal_housing_desc:0 "Housing is too important to be left to rent-seekers and construction mafias. Communal housing programs will repair decaying blocks, expand affordable homes and tie urban development to public need. A socialist city must be measured not by luxury towers, but by whether ordinary families can live with dignity."
  RCO_RO_state_plans_desc:0 "The revolution now requires schedules, inventories, quotas, engineers and accountable ministries. State plans will align banks, factories, railways and regional governments behind common targets. The people will not eat rhetoric; they will judge socialism by steel delivered, apartments finished and wages paid on time."
  RCO_RO_Perestroika_desc:0 "Our perestroika will not be a surrender dressed in reformist language. It will be restructuring in the original sense: rebuilding institutions that became corrupt, slow or deaf to the people. Socialism must be renewed from within before its enemies can exploit its weaknesses from without."
  RCO_RO_elected_judges_officers_desc:0 "Authority in a workers' state must answer to those it claims to defend. Electing judges and officers under socialist safeguards will break closed castes, expose careerists and remind every uniform and robe that legality belongs to the people. Discipline will remain, but arrogance will not."
  RCO_RO_promote_protectionism_desc:0 "Open markets were sold to Russia as a road to prosperity and became a road for foreign goods to bury domestic labour. Socialist protectionism will defend strategic industries, shield new factories and ensure that Russian workers are not sacrificed to imported dependency. Internationalism does not require economic disarmament."
  RCO_RO_siberian_settlements_desc:0 "Siberia is not a distant warehouse of resources; it is a frontier of socialist civilisation. New settlements, infrastructure and public services will anchor families where mines, forests, rivers and factories demand human presence. The east must become a homeland, not merely a map of extraction."
  RCO_RO_direct_democracy_desc:0 "The people must not be summoned only to applaud decisions already made. Direct democracy will strengthen workplace meetings, local referendums and soviet accountability, giving citizens a path to correct the state before frustration becomes apathy. Socialism breathes through participation."
  RCO_RO_unite_direct_soviet_dem_desc:0 "Local soviets, trade unions, communes and party organisations must not compete like rival ministries. Their democratic mechanisms will be joined into a coherent system where initiative rises from below and planning coordinates from above. Soviet power must again mean organised popular rule."
  RCO_RO_power_to_people_party_desc:0 "The party must lead because it convinces, serves and organises, not because it hides behind offices and stamps. Returning power to the people's party means cleansing careerism, opening debate and binding officials to the workers who raised them. A communist party that fears the people has already forgotten itself."
  RCO_RO_invest_in_healthcare_desc:0 "A socialist republic is judged in the hospital corridor as much as in the factory yard. Investment in healthcare will restore clinics, support doctors and make treatment a right rather than a privilege rationed by wealth. The life of a worker is not a cost on a balance sheet."
  RCO_RO_school_building_desc:0 "Every school built is a fortress against poverty, superstition and national decline. New classrooms, laboratories and teacher support will prepare children not for emigration or obedience, but for conscious citizenship in a modern socialist country. The republic's future begins at the blackboard."
  RCO_RO_encourage_siberia_business_desc:0 "Siberian development needs state direction, but it also needs local hands that know the terrain. Cooperatives, municipal enterprises and regulated small producers will be encouraged where they strengthen settlement, logistics and industry. Initiative on the frontier must serve the plan, not undermine it."
  RCO_RO_free_science_desc:0 "Science suffocates when every discovery must flatter a minister or chase a foreign grant. Free socialist science will protect research institutes, encourage honest debate and direct knowledge toward public need. The red future must be engineered by minds allowed to think boldly."
  RCO_RO_promote_immigration_desc:0 "A vast country cannot be rebuilt with empty towns and abandoned workshops. We will welcome workers, specialists and families willing to join the socialist project, especially where Siberia and the Far East need new life. Citizenship will be tied to labour, loyalty and a shared future."
  RCO_RO_new_wild_west_desc:0 "The old frontier was conquered by private hunger; ours will be opened by public purpose. The new wild west of Siberia will offer land, work, schools and collective security to those ready to build. Where capital saw only extraction, socialism will plant towns."
  RCO_RO_congress_CPRF_desc:0 "The congress will decide whether this renewal remains a compromise of factions or becomes a durable socialist course. Delegates from factories, regions, communes, youth organisations and the party must settle doctrine, leadership and the next plan. The red banner will leave the hall either as ceremony or as command."
