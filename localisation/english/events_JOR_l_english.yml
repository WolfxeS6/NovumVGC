l_english:
#Millenium Attack Trial
jordan_event.1.t:0 "The Millenium Attack Trial"
jordan_event.1.d:0 "The Millenium Attack Plot was a plot aimed at bombing four Jordanian areas, a fully booked hotel in Amman, a Christian Church on Mount Nebo, the border between Jordan and Israel and a site on the River Jordan where John the Baptist is said to have baptized Jesus. These bombings were prevented through the Jordanian intelligence, who intercepted a call between the leader of the Plot Abu Zubaydah and Khadr Abu Hoshar, a palestinian terrorist. The trial withholds 28 suspects, 22 of which were quickly found guilty. Abu Zubaydah has not been caught."
jordan_event.1.o1:0 "Death for Six of them, Prison for the Rest!"
#Laurence Foley's Death
jordan_event.2.t:0 "Death of Laurence Foley"
jordan_event.2.d:0 "This morning the United States diplomat Laurence Foley was killed on the street while he was on the way to his car. Two suspects are still on the run and are actively being searched for. Foley became USAID advisor to Jordan in 2000 and was a vital advisor to the Kingdom. It is suspected that islamists have conspired against the kingdom and have planned to kill Foley."
jordan_event.2.o1:0 "Rest in Peace Laurence Foley"
#Parliamentary Reform and Dissolution
jordan_event.3.t:0 "Dissolution of the Parliament and Reform"
jordan_event.3.d:0 "For the reason of safety concerns due to the regional instability and the will to reform the parliaments seat amount, King Abdullah II announced the suspension and eventual dissolution of the parliament. Elections are planned, but its not yet decided when they will be held. Anti-Government politicians believe the government will suspend elections as long as possible to have full power over affairs. The government counters this with temporary laws and transparency about the seat reform."
jordan_event.3.o1:0 "We should hold elections in 100 days!"
jordan_event.3.o2:0 "We should hold elections in 300 days!"
jordan_event.3.o3:0 "Hold off from elections for now...or forever."
#Parliamentary Election
jordan_event.4.t:0 "Parliamentary Elections of [GetYear]"
jordan_event.4.d:0 "Jordanians all over the country have gathered at the polling stations to vote for the newly organised parliament. Opposition parties have all boycotted the elections, with the exception of the §G Islamist Action Front §!, which put up many candidates across the country. Once the election is over the king is allowed to choose the prime minister for the next term. The safest option is pro-King Faisal Al-Fayez, but this could upset the islamist groups in the country. Ishaq al-Farhan is the second option, but picking him could have §R unforseeable consequences §!"
jordan_event.4.o1:0 "The safe option, Faisal al-Fayez"
jordan_event.4.o2:0 "Represent the Islamic Action Front, Ishaq al-Farhan"
#Israeli-Jordan Water Pipe
jordan_event.5.t:0 "Jordan Requests Water Pipe Deal"
jordan_event.5.d:0 "The draining dead sea at the Jordan River has proven to become an issue for both of our states and the Kingdom of Jordan requests the building of a water pipe through Israel that goes from the Red Sea to the Dead Sea. This plan needs the support of both of our states. Rejecting this offer could have dire consequences for both of our states, but the choice is all yours."
jordan_event.5.o1:0 "This benefits both of our nations."
jordan_event.5.o2:0 "Why should we care?"
#GCC Investment Request
jordan_event.6.t:0 "Jordan Requests Investments!"
jordan_event.6.d:0 "The Hashemite Kingdom of Jordan sent a request for an industrial investment to all the members of the Gulf Cooperation Council. This procedure would cost us some money but in the long term could improve the regions economic power. Should we invest?"
jordan_event.6.o1:0 "Invest in them!"
jordan_event.6.o2:0 "We have nothing to spare."
#Jordan Investment Received
jordan_event.7.t:0 "They send Investments!"
jordan_event.7.d:0 "We have received a number of investments for the support of our industrial capacities. This will make us stronger than before!"
jordan_event.7.o1:0 "May God bless you."
#Fund the Secret Service
jordan_event.8.t:0 "The Secret Service Requests Higher Funds!"
jordan_event.8.d:0 "The General Intelligence Department requests a higher amount of state funding, due to recent national security risks. They request a high amount of money, but maybe it is worth it in the long run. The secret service arrested several suspects linked with Al-Qaeda months ago, who were planning a chemical attack on the headquarters of the General Intelligence Department."
jordan_event.8.o1:0 "A Medium Funding will be enough."
jordan_event.8.o2:0 "Give them all they need!"
#The Amman Bombings
jordan_event.9.t:0 "Terrorist Attacks in Amman!"
jordan_event.9.d:0 "A major bombing attack was set up across Amman with suicide bombers exploding in three major hotels, the Grand Hyatt Hotel, the Radisson SAS Hotel and the Days Inn, leading do the death of 57 people and approximately 115 injured people. The terrorist attack was claimed by the Iraqi group of Al-Qaeda who orchestrated the Attack under the leadership of Abu Musab al-Zarqawi."
jordan_event.9.o1:0 "Strenght to the Families and Death to Al-Zarqawi..."
#Death of Al-Zarqawi
jordan_event.10.t:0 "Death of Al-Zarqawi"
jordan_event.10.d:0 "After the US striked a safehouse near the Iraqi town of Baqubah, they announced the death of terrorist perpetrator Al-Zarqawi to us. The man who helped organise the horrible Amman bombings was finally put down and we can cross him off the list of terrorists that have to be caught."
jordan_event.10.o1:0 "Mission Completed."
#Death of Al-Zarqawi
jordan_event.11.t:0 "Death of Al-Zarqawi"
jordan_event.11.d:0 "The Jordanian Secret Service just striked down a cave in the desert in which Al-Zarqawi hid in. The man who helped organise the horrible Amman bombings was finally put down and we can cross him off the list of terrorists that have to be caught. A very observant strike from our own security forces."
jordan_event.11.o1:0 "Mission Completed."
#Iraqi Refugees
jordan_event.11.t:0 "Iraqi Refugees Cross the Border!"
jordan_event.11.d:0 "After the war in Iraq has started up and people start to flee the iraqi regions, a high amount of people needing of our help have crossed into Jordan. We will need to deal with this issue to prevent a big hit on our personal prosperity."
jordan_event.11.o1:0 "Mission Completed."
#SSNP Coup - No Baath
jordan_event.13.t:0 "The SSNP Coups the Government!"
jordan_event.13.d:0 "Today, a group of armed militants, led by supporters of the Syrian Social Nationalist Party in Jordan, stormed the parliament and palace to arrest and detain, not just members of the parliament, but also King Abdullah II. They proclaim a new era and speak of the rise of the fertile crescent, while blasting loud nationalist music and military marches. A council by the SSNP withholding the intellectuals and most radical nationalists of the party has been formed to lead the Jordanian Nation."
jordan_event.13.o1:0 "The §R Red $! Sun Rises..."
#SSNP Coup - With Baath
jordan_event.14.t:0 "The Baath-SSNP Coups the Government!"
jordan_event.14.d:0 "Today, a group of armed militants, led by supporters of the Baath Party and the Syrian Social Nationalist Party in Jordan, stormed the parliament and palace to arrest and detain, not just members of the parliament, but also King Abdullah II. They proclaim a new era and speak of the rise of the fertile crescent and a future of Arabic Unity, while blasting loud nationalist music and military marches. The militants have unanimously agreed on Akram Al-Homsi, leader of the Baath Party, to lead the Jordanian Nation and be a point of Unity for everyone."
jordan_event.14.o1:0 "Oh, Baath, Steadfast!"
#Damascus-Amman Axis
jordan_event.15.t:0 "Jordan invites us to the Liberation Axis!"
jordan_event.15.d:0 "A message arrived us today from our friends from Jordan who request us to join their alliance for a more structured and organised cooperation. It is rumoured that they are planning a war against Iraq and other nations. Shall we join the alliance?"
jordan_event.15.o1:0 "They have our word!"
jordan_event.15.o2:0 "Never!"
#Pro-Iraq Coalition
jordan_event.16.t:0 "Jordan invites us to the Amman Coalition!"
jordan_event.16.d:0 "A message arrived us today from our friends from Jordan who request us to join their alliance for a more structured and organised cooperation. It is rumoured that they are planning a war against Syria and other nations. Shall we join the alliance?"
jordan_event.16.o1:0 "They have our word!"
jordan_event.16.o2:0 "Never!"
#Iraq Ultimatum
jordan_event.17.t:0 "Jordan demands Us to Submit to Them!"
jordan_event.17.d:0 "A message arrived us today from the Jordanian Government who demand us to join their nation and unify the military commands for a more structured and organised cooperation. Their aim to unite the Fruitful Crescent is obvious. The options are to submit to their rule or to prepare for a war against them. What shall we do?"
jordan_event.17.o1:0 "We should submit. For the Crescent."
jordan_event.17.o2:0 "Never!"
#Syria Ultimatum
jordan_event.18.t:0 "Jordan demands Us to Submit to Them!"
jordan_event.18.d:0 "A message arrived us today from the Jordanian Government who demand us to join their nation and unify the military commands for a more structured and organised cooperation. Their aim to unite the Fruitful Crescent is obvious. The options are to submit to their rule or to prepare for a war against them. What shall we do?"
jordan_event.18.o1:0 "We should submit. For the Crescent."
jordan_event.18.o2:0 "Never!"
#The IAF Prepares for Government Responsibility
jordan_event.19.t:0 "The Islamic Action Front prepares for Government Responsibility"
jordan_event.19.d:0 "After the Jordanian parliamentary elections ended with a victory for the Islamic Action Front, they are preparing for the stacking of government positions with their people. King Abdullah II has internally been sceptical of the developements and will look into the IAF's actions harshly."
jordan_event.19.o1:0 "For A Glorious Jordan!"
#The SSNP Prepares Underground Opposition
jordan_event.20.t:0 "Unrest in the Underground Grows"
jordan_event.20.d:0 "The Syrian Social Nationalist Party (Jordanian Section) is secretly preparing a arsenal of weaponry to launch a suprise coup against the new and unstable Jordanian government. They are in contact with SSNP supporters and leaders from Syria, Lebanon and Palestine and its only a question of time when they will strike."
jordan_event.20.o1:0 "Unsettling."
#Handling the Monarchy
jordan_event.21.t:0 "Handling the Monarchy"
jordan_event.21.d:0 "Our new government has to put a specific topic to the test now. The idea of a monarchy is similar to what the islamists see as a leader, but King Abdullah II has openly blocked and barred us from doing certain policies. Two options are there, either we try to convince Abdullah II to convert to our ways and go as a modest leader of Islam, or we topple him and institute the newly freed Abu Zant as Supreme Supervisor. The choice is now."
jordan_event.21.o1:0 "All Hail Abu Zant!"
jordan_event.21.o2:0 "Listen your Majesty..."
#Druze State Request
jordan_event.22.t:0 "A Request from the Jordanian State"
jordan_event.22.d:0 "Message arrives from our friends in Jordan. The Jordanian Leader request us to give them control over the Southern Syrian Druze State. They need the state for strategic and religious purposes they state. They are not demanding anything, just a friendly request. Do we hand it over to them?"
jordan_event.22.o1:0 "They shall get the Druze State."
jordan_event.22.o2:0 "The Druze State is an important part of Syria."