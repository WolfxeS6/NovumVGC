l_english:
#Focuses
JOR_The_Kingdom_Remains:0 "The Kingdom Remains"
JOR_The_Kingdom_Remains_desc:0 "The Hashemite Kingdom of Jordan will enter the new millenium with a bright future under the young rule of King Abdullah II. A lot of work is still to be done to ensure our existance in this new time era."
JOR_Remember_Hussein_I:0 "Remember Hussein I"
JOR_Remember_Hussein_I_desc:0 "Hussein I, father of Abdullah II was the king of the Hashemite Kingdom of Jordan from 1952 until his death in 1999. He established Jordan as a diplomatic and econonmic power within the region. His work helped us reach agreements with Israel and the United States over special relations. We should remember his deeds."
JOR_Gulf_Diplomatic_Mission:0 "Gulf Diplomatic Mission"
JOR_Gulf_Diplomatic_Mission_desc:0 "Strenghtening our relations with the Gulf nations will lead to a prosperous economic and political future. Relations with the Gulf Cooperation Council are of utmost importance."
JOR_Economic_Liberalisation:0 "Economic Liberalisation"
JOR_Economic_Liberalisation_desc:0 "Economic Liberalisation is an important step to sustain in this time. Free markets and free trade will be a big step towards the new reforms."
JOR_Abdullahs_Reform_Plan:0 "Abdullah's Reform Plan"
JOR_Abdullahs_Reform_Plan_desc:0 "King Abdullah II has layed forth a plan for the reform of the economic system so we can properly expand our sectors. Tourism, Infrastructure, Military and Industrial reforms will be underway."
JOR_Join_the_WTO:0 "Join the WTO"
JOR_Join_the_WTO_desc:0 "We should join the World Trade Organisation for the benefit of trade and diplomatic contacts with other nations. Working together globally will be important to increase Jordans industrial power."
JOR_Petra_Tourism_Expansion:0 "Petra Tourism Expansion"
JOR_Petra_Tourism_Expansion_desc:0 "The Petra is one of the seven wonders of the world and opens up big possibilities for a tourism magnet. We should support hotels and touristic activities in the region."
JOR_Fund_Aqaba_Port:0 "Fund Aqaba Port"
JOR_Fund_Aqaba_Port_desc:0 "Aqaba Port is our biggest trading port and therefore an important piece of our trading power. Funding the port will ensure their existance and will open new trading hubs."
JOR_Amman_Infrastructure_Improvement:0 "Amman Infrastructure Improvement"
JOR_Amman_Infrastructure_Improvement_desc:0 "Amman is our capital and should be our model city, ensuring proper streets, public transport and sidewalks is a minimum for this project."
