 SOV_wag_integrate_belarus:0 "Integrate Belarus"
 SOV_wag_integrate_belarus_desc:0 "Absorb Belarusian territories into the core state administration once compliance reaches §Y80%§! across the region."
 SOV_wag_integrate_ukraine:0 "Integrate Ukraine"
 SOV_wag_integrate_ukraine_desc:0 "A massive and costly project of forced integration. Requires ownership, control, and §Y80% compliance§! in all Ukrainian core states."
 SOV_wag_integrate_baltics:0 "Integrate the Baltic States"
 SOV_wag_integrate_baltics_desc:0 "Collapse local administrative autonomy and merge Baltic territories into the central state once compliance benchmarks are met."
 SOV_wag_integrate_finland:0 "Integrate Finland"
 SOV_wag_integrate_finland_desc:0 "Complete long-term pacification and legal assimilation of Finnish territories after reaching §Y80% compliance§! in every relevant state."
 SOV_wag_integrate_moldova:0 "Integrate Moldova and Transnistria"
 SOV_wag_integrate_moldova_desc:0 "Formalize direct rule in Moldova and Transnistria once occupation compliance reaches sustainable levels."
 prca_RCO_build_and_rebuild:0 "Forward!"
prca_RCO_research:0 "Glory to Soviet Science!"
prca_RCO_production:0 "Laziness - Enemy of Progress!"
prca_RCO_manpower:0 "Did You Enlist?"
prca_RCO_offensive:0 "Forward to Victory!"
prca_RCO_defence:0 "We Must Win And We Will"
prca_RCO_doctrine:0 "Tradition of Winning"
prca_RCO_resistance:0 "§RGlory to Soviet Soldier-Liberator!§!"
prca_RCO_resistance_desc:0 "The image of the Soviet soldier as a liberator, defender, and avenger is pushed through newspapers, radio, factory meetings, and front-line bulletins. The campaign is not built around careful policy arguments, but around pride: the belief that retreat is shameful, endurance is sacred, and every hardship is part of a larger historic duty."
prca_RCO_second_campaign:0 "§RForward to Victory!§!"
prca_RCO_second_campaign_desc:0 "This campaign demands movement, initiative, and pressure. Commanders are encouraged to seize opportunities, soldiers are told that hesitation gives the enemy time to breathe, and the public is promised that only offensive energy can shorten the war. The result is a sharper attacking spirit and a stronger will to break through enemy lines."
prca_RCO_third_campaign:0 "§RTradition of Winning§!"
prca_RCO_third_campaign_desc:0 "The state reminds the army that it inherits more than rifles and uniforms: it inherits a tradition of operational art, sacrifice, and victory under impossible conditions. Military schools, veteran circles, and political officers turn past campaigns into practical lessons, improving confidence and command discipline without pretending that slogans replace training."
prca_RCO_fourth_campaign:0 "§RDid you Volunteer?§!"
prca_RCO_fourth_campaign_desc:0 "Posters appear in stations, universities, factories, and housing blocks asking the same uncomfortable question: if the country is fighting, where are you? The campaign brings volunteers into the ranks, accelerates basic preparation, and turns military service into a visible public duty."
prca_RCO_fifth_campaign:0 "§RWait for me. I will return with Victory§!"
prca_RCO_fifth_campaign_desc:0 "Letters from home, portraits of families, and stories of soldiers returning victorious become the emotional center of the war effort. The campaign strengthens morale at the front, patience in the rear, and the belief that sacrifice will be answered with victory."
prca_RCO_sixth_campaign:0 "§CScience and Production for Victory!§!"
prca_RCO_sixth_campaign_desc:0 "Engineers, researchers, and factory directors are presented as soldiers of a different front. Laboratories receive political protection, production councils are pushed to solve bottlenecks faster, and technical specialists are celebrated as builders of victory. The campaign improves research discipline and industrial quality."
prca_RCO_seventh_campaign:0 "Workers of the Rear Forge Victory!"
prca_RCO_seventh_campaign_desc:0 "The rear is turned into a battlefield of labor: construction crews, machinists, railway workers, and repair brigades are told that every completed shift is a shot fired at the enemy. Productivity rises, public confidence improves, and the economy moves with a clearer sense of purpose."
prca_RCO_eighth_campaign:0 "Laziness - enemy of Progress!"
prca_RCO_eighth_campaign_desc:0 "This is the hardest-edged of the economic campaigns: delays are named, absenteeism is shamed, and factory discipline is treated as a patriotic obligation. Output rises as managers and workers are pushed to treat every wasted hour as a gift to the enemy."
prca_RCO_warsupport:0 "Wait for Me, I will return with Victory!"
RCO_prca_category:0 "Propaganda Campaigns"
RCO_prca_category_desc:0 "The revolution now commands its own front of words, images and disciplined agitation. Every poster on a factory wall, every radio speech at the barracks, every printed leaflet in a railway station is another small blow against doubt, panic and passivity. Propaganda does not merely describe the struggle: it teaches the people how to see it, how to endure it, and how to win it."
SOV_wagner_propaganda_campaigns_category:0 "Wagner Propaganda Campaigns"
SOV_wagner_propaganda_campaigns_category_desc:0 "Psychological operations do not end at the enemy border. The Wagner state now treats posters, slogans, battlefield clips, Orthodox symbolism, recruitment drives and controlled online mythology as instruments of command. Every campaign is a temporary offensive against doubt: a way to discipline the rear, harden the front, and turn the image of Wagner from a private army into the spearhead of a reborn Russia."
sov_wag_text_stuff_available_campaigns:0 "§RThe Information Front§!\n§gThe orchestra no longer plays only with artillery. It plays through screens, factory walls, barracks corridors and whispered rumors in enemy capitals.§!\n§YAvailable campaign slots: [?SOV_wag_available_campaign_slots]§!\nWagner propaganda campaigns are temporary operations. Up to §Ythree§! can run at the same time; each new campaign raises future political cost."
SOV_wag_prca_god_save_russia:0 "§YGod, save Russia!§!"
SOV_wag_prca_god_save_russia_desc:0 "Church bells, military funerals, icons carried beside unit banners, and speeches about Russia's sacred endurance are joined into a single emotional campaign. The message is simple: the state may have changed hands, but Russia itself is eternal, and Wagner now claims to stand guard over its survival."
SOV_wag_prca_motherland_calling_zov:0 "§RMotherland is calling - ZOV§!"
SOV_wag_prca_motherland_calling_zov_desc:0 "The old image of the Motherland calling is recast in harsher modern colors: drone footage, burned vehicles, black-and-red insignia, and the letter ZOV stamped across recruiting walls. Commanders are told to advance, not explain; soldiers are told that hesitation is betrayal."
SOV_wag_prca_working_from_distance:0 "§CI am working from Distance§!"
SOV_wag_prca_working_from_distance_desc:0 "Anonymous channels, cut-out companies, offshore servers and deniable media teams begin repeating the same message from a thousand directions. The public sees memes and rumors; the command staff sees a coordinated psychological operation designed to map networks, lower operational costs, and turn distance into cover."
SOV_wag_prca_musicians_world_knows:0 "§RMusicians the whole World know about§!"
SOV_wag_prca_musicians_world_knows_desc:0 "The campaign sells Wagner as a name already known from deserts, cities, mountains and ruined industrial fronts. Veterans are filmed as professionals rather than conscripts, and foreign reports of Wagner activity are turned into proof that the orchestra can play anywhere. The myth strengthens elite formations and the officers who imitate them."
SOV_wag_prca_enlist_wagner:0 "§RDid you enlist in Wagner Group?§!"
SOV_wag_prca_enlist_wagner_desc:0 "Billboards, prison-yard rumors, veteran recruiters and online clips ask the same question with little subtlety: if Russia is being remade by fighters, why are you still standing aside? The campaign brings in harder volunteers and accelerates the machinery that turns men into deployable formations."
SOV_wag_prca_tanks_not_afraid:0 "§RTanks are not afraid of Mud§!"
SOV_wag_prca_tanks_not_afraid_desc:0 "Armored crews, repair brigades and mechanized commanders are pushed into the center of the Wagner myth. Mud, snow and broken roads are no longer excuses but proof of toughness: if the machine keeps moving where others stop, the state keeps moving with it."

