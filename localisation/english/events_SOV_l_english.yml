l_english:
 election_SOV.1.t:0 "Russian Election of 2000"
 election_SOV.1.d:0 "Boris Yeltsin's long-time rule of Russia has recently ended, with his political protegé Vladimir Putin being made acting president. Especially through his resolute policy regarding Chechnya, the previously unknown Putin generally earned the approval of the Russian public. Now, elections for the office of President are being held, and Putin is looking to have his government confirmed.\n\nThe other candidates include the ultra-nationalist Zhirinovsky, the neo-Soviet communist Zyuganov and the democratic liberal Yavlinsky."
 election_SOV.1.o1:0 "Putin"
 election_SOV.1.o2:0 "Zhirinovsky"
 election_SOV.1.o3:0 "Zyuganov §RPotential Civil War§!"
 election_SOV.1.o4:0 "Yavlinsky"

 russia.1.t:0 "The Kursk Submarine Disaster"
 russia.1.d:0 "The Kursk Submarine Disaster was a naval incident 75 kilometres north of the Kola Peninsula, Russia. \n\nThe Russian Oscar-class submarine K-141 'Kursk' suffered a faulty weld on a 65-76 practice torpedo, which caused a peroxide explosion and the subsequent detonation of at least 5 torpedo warheads. \n\nThe Russian Naval Command greatly underestimated the situation and declined international help on the basis of crude allegations that NATO might be involved with the sinking. Although many of the crew members survived the initial explosions, which were even registered by seismographs in the US state Alaska, and were trapped under the sea, the slow and ineffective Russian response ultimately led to the death of all 118 sailors."
 russia.1.o1:0 "Horrible!"
 russia.2.t:0 "Russia offers Union State"
 russia.2.d:0 "Our friends in Russia have offered to draw closer in regards to our already pre-existing Union State and to make it a State Union. Sure, it would give up Belarussian independence, but that is but a small price to pay, right?"
 russia.2.o1:0 "The Union it is!"
 russia.2.o2:0 "Resist and bite!"
 russia.3.t:0 "Belarus accepts!"
 russia.3.d:0 "Belarus has accepted the Union State proposal. They will now follow our orders. Our other allies are however unlikely to approve."
 russia.3.o1:0 "Excellent."
 russia.4.t:0 "Belarus resists us!"
 russia.4.d:0 "Belarus has had the audacity to resist Russian wishes for a Union State! We have to prepare an answer."
 russia.4.o1:0 "Fools."
 russia.5.t:0 "Russian Imperialism threatens our Sovereignty!"
 russia.5.d:0 "Russia has united with Belarus, basically rendering the government in Minsk meaningless. This shows without a doubt that Russia is willing to put its own neo-Soviet imperialist demands over the good of its allies! How shall we respond?"
 russia.5.o1:0 "We have to break our ties."
 russia.5.o2:0 "We have to hope for the best..."
 russia.6.t:0 "Russian Southern Protection Program"
 russia.6.d:0 "Russia has announced that it would stand with us in military conflict and has sent us military advisors to help or defend against our adversaries."
 russia.6.o1:0 "Excellent."
 russia.7.t:0 "The Invasion of Crimea"
 russia.7.d:0 "While ethnic Russians always were not the happiest of our population groups, this does not explain the unmarked and heavily armed militias invading the peninsula from the east and pushing out our troops. It is now very clear that these separatists are backed, armed and commanded by the Russians, who are massing on our borders. We have to find a response."
 russia.7.o1:0 "We will back down."
 russia.7.o2:0 "We shall stand and fight!"
 russia.8.t:0 "Ukraine backs down!"
 russia.8.d:0 "The Ukrainian government is forced to retreat! Crimea is ours!"
 russia.8.o1:0 "Excellent."
 russia.9.t:0 "Ukraine meets our challenge!"
 russia.9.d:0 "Against all expectations, Ukraine will fight over Crimea, and in response our commanders have already given the orders to advance. We have started something that we will not be able to stop that easily."
 russia.9.o1:0 "Let's do this."
 russia.10.t:0 "Novorossiya"
 russia.10.d:0 "The eastern provinces of Ukraine rise against us in rebellion! The Russian population groups have called us oppressors and slave herders and have called our friendly relations with the west unacceptable. War is inevitable this time!"
 russia.10.o1:0 "We will send them straight to hell."
 russia_news.1.t:0 "Vladimir Putin elected President"
 russia_news.1.d:0 "As was completely predictable, the young political upstart Vladimir Putin, acting president since December 31st, 1999, has been confirmed in his office as President of Russia by popular vote.\n\nPutin was internationally perceived as little more than a puppet who got to power simply because he was Boris Yeltsin's designated political successor, but his recent unforgiving policy on the Chechen insurgency has already proved him to be a more resolute leader than some of his sceptics may expect."
 russia_news.1.o1:0 "Let's see how he does."
 russia_news.2.t:0 "Vladimir Zhirinovsky elected President"
 russia_news.2.d:0 "Even though most observers expected Boris Yeltsin's heir Vladimir Putin to win, it seems as if the Russian population has chosen the hyper-nationalistic Liberal Democratic Party and their leader, Vladimir Zhirinovsky, to fill the position of Russian President."
 russia_news.2.o1:0 "Putin's career is at an end."
 russia_news.3.t:0 "Gennady Zyuganov elected President"
 russia_news.3.d:0 "In an unexpected turn of events, the Communist Party of the Russian Federation has seen its leader, Gennady Zyuganov, elected to the presidency. This comes as an absolute shock, as the presidency was already considered pre-determined and won by Vladimir Putin, the designated heir of Boris Yeltsin. It appears Russian elections are less (or far more) rigged than expected."
 russia_news.3.o1:0 "Does that mark the rebirth of the USSR?"
 russia_news.4.t:0 "Grigory Yavlinsky elected President"
 russia_news.4.d:0 "An internationally almost completely unknown political activist, Grigory Yavlinsky, has won the Russian Presidential Election in what can only be described as a political earthquake. The question of Boris Yeltsin's succession was considered answered before it was even asked, with Vladimir Putin clearly favoured among the different candidates. But it appears that the conservative and oligarch-friendly course of Yeltsin's government has not helped Putin's campaign. The Russian people have selected the liberal Yavlinsky instead."
 russia_news.4.o1:0 "Good luck, Grigory!"
 russia_news.4.o2:0 "...who?"
 russia_news.666.t:0 "Zuganov Claims Victory"
 russia_news.666.d:0 "Against expectations Zuganov has grasped a victory. Crisis has swept Russia as it begins to slide back towards the left."
 russia_news.666.o1:0 "Things will settle down"
  #RCO
 RCO_event_popov_partyprogramm.1.t:0 "Popov's Plan"
 RCO_event_popov_partyprogramm.1.d:0 "Popov has a plan that he wants to introduce in order to make our country great again, let's hope that his plans will actually work."
 RCO_event_popov_partyprogramm.1.a:0 "The union counts on him!"
 
 RCO_event_popov_economyprogramm.1.t:0 "The Vision for Economy"
 RCO_event_popov_economyprogramm.1.d:0 "After the civil war our economy is in a terrible state, however our leadership has a plan of how to get us out of this mess and bring us to economic success!"
 RCO_event_popov_economyprogramm.1.a:0 "Let's hope that will work"
 
 RCO_event_popov_stateprogramm.1.t:0 "The Future of our State"
 RCO_event_popov_stateprogramm.1.d:0 "If we wish to export the revolution to all over the world, we need to firstly need to take care of our own state, and to achieve that we will work towards achievement of our dreams for the new Russia!"
 RCO_event_popov_stateprogramm.1.a:0 "Let's hope that will work"
 
 RCO_event_kaz_ultimatum.1.t:0 "Russian Demands"
 RCO_event_kaz_ultimatum.1.d:0 "The fact that Russia wishes to rebuild the Soviet Union is dangerous to us, but now that danger has been realised, they are demanding that we join their nation otherwise they will launch a military assault on our country."
 RCO_event_kaz_ultimatum.1.a:0 "We don't have a choice..."
 RCO_event_kaz_ultimatum.1.b:0 "We will NOT be oppressed again!"
 
 RCO_event_taj_ultimatum.1.t:0 "Russian Demands"
 RCO_event_taj_ultimatum.1.d:0 "The fact that Russia wishes to rebuild the Soviet Union is dangerous to us, but now that danger has been realised, they are demanding that we join their nation otherwise they will launch a military assault on our country."
 RCO_event_taj_ultimatum.1.a:0 "We don't have a choice..."
 RCO_event_taj_ultimatum.1.b:0 "We will NOT be oppressed again!"
 
 
 russia.11.t:0 "Public discontent"
 russia.11.desc:0 "Since the unification of the Communists, their actions have become more frequent and serious. More and more people go to their side, more and more sympathising with them. A rise in trade union activity has been noticed, but it is independent of the communists."
 russia.11.a:0 "It is sad"
 russia.12.t:0 "Trade unions supports communists"
 russia.12.desc:0 "Now the unions support the communists and their actions will become more effective."
 russia.12.a:0 "Another blow to capitalism"
 russia.13.t:0 "Unknown attacked the Novgorod branch of the Communist Party"
 russia.13.desc:0 "Unknown radicals attacked the Novgorod branch of the Communist Party. Fifteen people were injured, equipment was broken and furniture was broken. The investigative committee promised to investigate this incident. No comments from the government yet."
 russia.13.a:0 "They got what they deserved"
 russia.14.t:0 "Dockers of St. Petersburg went on strike"
 russia.14.desc:0 "Dockers of St. Petersburg went on strike because of government actions. People tend to support them. Capitalists are putting more pressure on us"
 russia.14.a:0 "Again the communists spoil everything"
 russia.15.t:0 "The government is slowing down the investigation"
 russia.15.desc:0 "The government is slowing down the investigation of the Novgorod incident"
 russia.15.a:0 "All good"
 russia.16.t:0 "General strike!"
 russia.16.desc:0 "The communists, together with the trade unions, began a general strike in Petersburg. We have already mobilised our police units and the army."
 russia.16.a:0 "Disperse these pigs"
 russia.17.t:0 "General strike swept the whole country"
 russia.17.desc:0 "General strike swept the whole country. We were able to cut off government buildings in Irkutsk, the Trans-Urals and in the Caucasus, but all of European Russia remained at the mercy of the proletariat and the rest of the workers."
 russia.17.a:0 "Again..."
 russia.18.t:0 "General strike was dispersed"
 russia.18.desc:0 ""General strike was dispersed, but it doesn't seem like the communists will stop."
 russia.18.a:0 "Mobilise all police and army units. We will try to stop them"
 russia.19.t:0 "Main TV channels criticise communism"
 russia.19.desc:0 "Main TV channels criticise communism"
 russia.19.a:0 "Ok"
 russia.20.t:0 "New Soviet power"
 russia.20.desc:0 "We were able to seize power and now dispose of it in the European part of Russia and the Far East. This time we will never fall."
 russia.20.a:0 "For a Soviet power!"
 russia.21.t:0 "Chinese ultimatum"
 russia.21.desc:0 "China has given us an ultimatum! The Chinese want to control a number of Far Eastern territories seized by the Russian Empire in the 19th century. If we refuse, then China will use force, but if we agree, then China guarantees us protection from the United States and NATO during the civil war and for several years after it. I'm afraid we have no choice."
 russia.21.a:0 "revisionists..."
 russia.22.t:0 "Communist uprising in Belarus"
 russia.22.desc:0 "Comrades from Belarus overthrew the bourgeois government and established Soviet power"
 russia.22.a:0 "Workers of the world, unite!"
 russia.23.t:0 "NATO intervention in Kaliningrad"
 russia.23.desc:0 "Taking advantage of our civil war, NATO troops invaded Kaliningrad from Poland and occupied it. China warned us that it would not fight with NATO because of this."
 russia.23.a:0 "It was expected"
 russia.24.t:0 "Integration of the New Republics"
 russia.24.desc:0 "The republics recently included in the USSR are fully integrated."
 russia.24.a:0 "Great"
 russia.25.t:0 "Comintern: attitude towards fascism"
 russia.25.desc:0 "The first part of the founding congress of the Comintern examines the attitude of the Communist International towards fascism. Dmitrov’s wording was taken for the concept of fascism. Some comrades believe that fascism is not a serious threat to Soviet Russia, but can act as a weapon against Western imperialism. Another part of the comrades, led by Mikhail Popov, argues that fascism is the most aggressive imperialism (as Dmitrov’s concept implies) and we need to direct all our efforts to the struggle against international fascism. Whose position will the Comintern take?"
 russia.25.a:0 "Popov is right. Fascism is the enemy"
 russia.25.b:0 "Fascists can not pose a threat to us"
 russia.26.t:0 "The Comintern: Attitude to Social Democracy"
 russia.26.desc:0 "In the second part of the constituent congress of the Comintern, the question of the relationship of the Communist International to Social Democracy is examined. The first group of comrades adheres to the positions of a hundred years ago and believes that the Social Democrats are friends of the working class, and therefore to us. The second group of comrades, again led by Popov (but this time also supported by Tulkin), considers Social Democracy a traitor to the working class and believes that it is necessary to fight social democracy in every possible way and oppose its communist ideology. Whose position will the Comintern take?"
 russia.26.a:0 "Social democracy is loyal to the working class"
 russia.26.b:0 "Social Democracy is Bourgeois"
 russia.27.t:0 "Comintern: Attitude towards Chinese Communism"
 russia.27.desc:0 "In the third part of the founding congress of the Comintern, the question of the relationship of the Communist International to Chinese communism is examined. The first group of comrades considers China a beacon of communism, and the second group considers that there is no communism in China, and considers China a revisionist. The third group, consisting mainly of communists of the pre-revolutionary period, agrees in everything with the second group, however, it is not against a temporary alliance with the PRC, as with a fighter against American imperialism. Sure, spoiling relations with China is not the best option now, but is China worth the betrayal of Marxism? Whose position will the Comintern take?"
 russia.27.a:0 "China is our ally"
 russia.27.b:0 "China - Revisionist"
 russia.27.c:0 "China's provisional adoption"
 russia.28.t:0 "Red emigrants"
 russia.28.desc:0 "Communists of all countries seek to help us in our difficult struggle."
 russia.28.a:0 "Good"
 russia.29.t:0 "Supreme Council Appeal"
 russia.29.desc:0 ""The capitalist government has been deposed. State power has passed into the hands of the body of the Supreme Soviet of the RSFSR. The cause the people have fought for: immediate improvement of living conditions, the transition to a 6-hour working day, worker control over production, the creation of the Soviet government - this is ensured. Workers, soldiers, working people of Russia, fight to the end and do not feel any regret for your oppressors. In the struggle you will gain your freedom. Long live the revolution of the working people of Russia! " In its own words about the reduction of the working day and the improvement of living conditions, the document made a great impression on the citizens of Russia, who did not understand what to do during such drastic changes."
 russia.29.a:0 "For the revolution"
 russia.30.t:0 "The betrayal of the Communist Party"
 russia.30.desc:0 "At an extraordinary congress of the Communist Party, it was decided to support the counter-revolutionary government of Russia. "Our duty in these harsh days is to fight against neo-Trotskyism, which has won the minds of the Russian people," Zyuganov said at his statement. Of course, not all members of the Communist Party supported the tactics of supporting Putin. Some left the party and joined the real communists."
 russia.30.a:0 "It was expected"
 russia.31.t:0 "Kazakhstan enters the war"
 russia.31.desc:0 "A day ago, the Minister of Defense of Kazakhstan announced the entry of Kazakhstan into the civil war in Russia on the side of the bourgeois government. However, the Armed Forces of Kazakhstan leave much to be desired."
 russia.31.a:0 "It was expected"
 russia.31.t:0 "Kazakhstan offers peace"
 russia.31.desc:0 "Against the background of the apparent imminent defeat of the counter-revolution in the civil war and the surrender of some of the Kazakhstani territories of Soviet Russia, the government of Kazakhstan offered us a peace treaty, according to which the north-eastern and north-western territories of Kazakhstan are leaving us. After consultation with the Chinese ambassador (China is still the guarantor of our security), we received a very persistent recommendation to sign a peace treaty."
 russia.31.a:0 "We are dependent on China, we have to sign the world"
 russia.33.desc:0 "After the revolution of 1917 and the bloody execution of the king, his heirs were scattered around the world. We found the main contenders for the royal throne. This is Tsesarevich Georgy Mikhailovich, a direct descendant of the German emperor Wilhelm II, the Russian emperor Alexander the Second, Queen Victoria of England. And the Grand Duke Vladimir Kirillovich was born on August 17, 1917 in Finland, in exile with Sovereign Kirill Vladimirovich. He was raised by a truly Russian man. He was fluent in Russian, many European languages, knew the history of Russia, was a well-educated erudite person and felt true pride that belongs to Russia. You can also establish a National Russian Council, in view of the likely incapacity of the tsar’s heirs."
 russia.33.t:0 "The heirs of the Romanovs"
 russia.33.a:0 "George Mikhailovich"
 russia.33.b:0 "Vladimir Kirillovich"
 russia.33.c:0 "National Russian Council"
 russia.34.t:0 "Joining the USSR"
 russia.34.desc:0 "Our socialist republic has developed enough to enter the USSR as an integral republic."
 russia.34.a:0 "To the victory of communism!"
 russia.35.t:0 "Some military want to join us"
 russia.35.desc:0 "The military communists, some of whom still served in the USSR, want to join our army. They should not be considered careerists, because they are going to the Red Army at a difficult time for the Republic."
 russia.35.a:0 "They will be very handy"
 russia.99.t:0 "Thailand Requests Tank Licence"
 russia.99.d:0 "The Thai government is very impressed by our tanks and requested a licence to produce them."
 russia.99.o1:0 "Sounds like good business"
 russia.99.o2:0 "Those tanks could fall into the wrong hands"

 ## new russian events

 russ.1.t:0 "Russian Guides"
 russ.1.desc:0 "Good day, dear player. This event is meant to tell you possile Russian paths and their pros and cons.\n1. §CHistorical path.§! It contains focus tree, which you can see right now. Russia has a lot of problems with its military and industry. After dealing with debuffs, you can build military with, perhaps, biggest artillery buffs in the game; special forces are also massively favoured; other military buffs are comparable with what other countries have. Foreign policy branch is centered around unification of post-soviet countries more or less peacefully.\n2. §OYavlinsky path.§! It is rather less interesting, but contains an opportunity to join NATO and EU. To open this path, you should choose Yavlinsky as president elections winner.\n3. §RSoviet path§! offers you massive industry buffs. Note, that it is more of a late-game build, as you will likely suffer in the beginning. National-Bolsheviks also can be found here. Soviet army offers great fighting resistance bonuses, good armor and some other minor buffs. Foreign policy allows you to ignite civil war in post-soviet space and quickly capture Ukraine, Belarus and Kazahstan. In order to unlock this path, you should elect Zyuganov, wait for some time and navigate through decisions.\n4. §8Wagner path§! offers good army and medium economy bonuses. It is centered around asserting Russian global dominance. In order to get this path you should give Wagner full autonomy in the event and ignite uprising throgh balance of power mehanic."
 russ.1.a:0 "Activate Tough Player Mode"
 russ.1.b:0 "Have a good game!"
 russ.2.t:0 "The question of migration"
 russ.2.desc:0 "Millions of man from Central Asian post-soviet republics are coming to Russia in order to work here, as Russian salaries are much higher than what they have at home. However, migrants are not assimilating into Russian society. They often live in closed communities, which increases crime rates and general social disunity. Now we should decide, who Russian government will approach this issue."
 russ.2.a:0 "Promote migration"
 russ.2.b:0 "Enact moderate regulations"
 russ.2.c:0 "Enact harsh regulations"
 russ.3.t:0 "New Russian Constitution"
 russ.3.desc:0 "Vladimir Putin managed to improve internal situation in Russia and consolidate power aroung himself and his allies. Now, it is time to decide the course of Russian Federation. We can either keep the working system, concentrate on internal stability and bring economic and social prosperity to Russia, or drift to Russian nationalism, concentrating on Defence of Russian fdrom external enemies and preservation of Russian cultural identity."
 russ.3.a:0 "§CCivilian focus§!"
 russ.3.b:0 "§RDefence focus§!"
 russ.4.t:0 "Non-agression pact with Russia?"
 russ.4.desc:0 "Russia has proposed a non-agression pact. It might be useful to accept the proposal. Especially, if we want to be friends with Russian Federation."
 russ.4.a:0 "Accept"
 russ.4.b:0 "Reject"
 russ.5.t:0 "Mutal Defence treaty with Russia?"
 russ.5.desc:0 "After recent non-agression pact with Russia, their diplomats are now proposing a new treaty, which includes mutal independence guarantees."
 russ.5.a:0 "Accept"
 russ.5.b:0 "Reject"
 russ.6.t:0 "Russians offer help"
 russ.6.desc:0 "It is no secret, that our country is in quite bad economical situatuin right now. Despite Russian betrayal of communism, we still have kind of cordial relations between our nations. Moreover, Russia has started to lead an active foreign policy, including possibal military confontation with number of countries. They offer us economic help in exchange of some military equipment. Their propsal is: \n\n-We give them 2000 assualt rifles and 500 towed artillery pieces; \n-They provide us with supstencial economic aid."
 russ.6.a:0 "Accept"
 russ.b.a:0 "Reject"
 russ.7.t:0 "North Korea accepted"
 russ.7.desc:0 "North Korean government has accepted our offer and in exchange provided us with some military equipment (2000 assault rifles and 500 towed artillery pieces)."
 russ.7.a:0 "Great"
 russ.8.t:0 "Russian ultimatum"
 russ.8.desc:0 "Russians has sent us an ultimatum, demanding us to join their sphere of influence. Otherwise, they are ready to use military force."
 russ.8.a:0 "Accept"
 russ.8.b:0 "Reject"
 russ.9.t:0 "Invitation to CSTO"
 russ.9.desc:0 "Russian diplomatic representative has recently officially invited our country to join Russian military alliance CSTO. What should we do?"
 russ.9.a:0 "Join"
 russ.9.b:0 "Refuse to join"
 russ.10.t:0 "Unification with Russia?"
 russ.10.desc:0 "It seems, that Russian side wants to expand the Union state and fully unite our countries. How should we proceed ?"
 russ.10.a:0 "Unify with Russians"
 russ.10.b:0 "Reject"
 russ.11.t:0 "Belarus refused to unify"
 russ.11.desc:0 "Belorussian side has refused to fully unify our countries under the Union State. Now, we can either forget it and proceed to other issues, or try to confront them."
 russ.11.a:0 "Confront Belarus"
 russ.11.b:0 "Forget it"
 russ.12.t:0 "Invitation to CSTO"
 russ.12.desc:0 "Russian diplomatic representative has recently officially invited our country to join Russian military alliance CSTO. What should we do?"
 russ.12.a:0 "Join"
 russ.12.b:0 "Refuse to join"
 russ.13.t:0 "Ukraine refused"
 russ.13.desc:0 "Ukrainian have refused to join our faction."
 russ.13.a:0 "Execute plan B"
 russ.14.t:0 "The proposal was rejected"
 russ.14.desc:0 "Unfortunately, our recent proposal to a foreign power was rejected."
 russ.14.a:0 "We tried"
russ.15.t:0 "The proposal was accepted"
russ.15.desc:0 "Luckily, foreign government has accepted our recent proposal."
russ.15.a:0 "Good to have them"
russ.16.t:0 "The Otkazniki problem"
russ.16.desc:0 "The situation with otkaxniki (refusers) began to heat up a few months ago. Before the war started, there were very few refusals. Most of them were written by officers who had fought in Chechnya and Syria and realized that the approaching war was just another gamble by the Russian authorities. But there were a few dozen such refuseniks for the entire army. They were either offered to resign from the armed forces or, if they had a lot of experience and a rare military specialty, they tried to persuade them to stay or began to threaten them.\n\n"Privates, sergeants, lieutenants. The guys looked at f*cked up situation going on, at the first killed, at the stalled equipment, at the burning columns. They started talking softly about how to return to Russia. There were cases of desertion, there were cases of surrender. In front of the ranks, political patrols were performing, talking about criminal responsibility for desertion, about wartime laws. Then these scary stories were enough to scare people. But whispers went around the companies and platoons about a soldier who surrendered to the Khokhalese in order not to fight, about someone who had successfully escaped and was supposedly already at home,” says a commander of one of the units of the Russian Armed Forces."
russ.16.a:0 "This problem should be dealt with"
russ.17.t:0 "A day in the Office"
russ.17.desc:0 "Major General Ismailov? - one of the investigators asked. Ismailov and Kotlov stood up, both their faces pale.\n'Yes,' said the general.\nAnd who are you? - asked the investigator, addressing Kotlov.\nColonel Kotlov, senior officer of the department, - Igor introduced himself.\nGo to your workplace and wait, you also need to be questioned.\nYes,” Igor nodded, and on his way out, he heard the investigator introduce himself to the general and talk about the ‘search warrant’.\n\nIn his office, he didn't know where to put himself. The trembling in his hands, which had begun in the general's office, had already passed, but his heart continued to pound like a madman. Involuntarily he listened to every sound of footsteps coming from the corridor, nervously waiting for the denouement - the appearance of “his” investigator.\n\nHe wanted only one thing now - for all this not to happen. He was ready to return to the past, to live his life anew, without making the mistakes he had already made, without bowing to the weaknesses that had pushed him down the path of official crimes. \n\nIgor suddenly thought that the changes that might soon take place in his life would become unbearable for him. He didn't want to return to a life that didn't have the opportunities he had now. Then maybe it would be better to... shoot himself? "
russ.17.a:0 "At that moment the door suddenly opened.."
russ.18.t:0 "Intelligence situation normalizes"
russ.18.desc:0 "Gradually, the situation in the Foreign Intelligence Service normalized. The state, realizing that it could not survive if the existing corrupt system was not broken, began to fight those who had openly plundered the intelligence service over the years. If this could be tolerated in peacetime, it could not be tolerated during the war.\n\nThose responsible for the failures of the first days of the war were arrested. Many were sent to the front “to atone for their sins with blood”. Gradually, patriotic officers filled the vacant positions, and foreign intelligence gradually began to work properly."
russ.18.a:0 "Good to hear that"
russ.19.t:0 "Inspection in Difence Ministry"
russ.19.desc:0 "Before the war, conditions were created in the Russian army (as in almost all parts of the state apparatus) when it was almost impossible for honest people to work there. The nepotism, corruption, endless write-offs and mountains of unnecessary reports in which the army was mired made combat work of units virtually impossible.\n\nIt is necessary to arrest the most egregious corrupt and inept commanders who got their positions through connections at the top. Otherwise, the Russian army simply cannot continue military operations."
russ.19.a:0 "Situation must be fixed"
russ.20.t:0 "Results of purges in Army"
russ.20.desc:0 "Gradually the work of the War Department reached the level it was supposed to be at all along. Officers who were not fit for their positions were dismissed, and more talented young fighters took their place. Unnecessary reports were canceled, and the Army's management and logistics system was simplified."
russ.20.a:0 "Now we can start working"
russ.21.t:0 "National Reunification"
russ.21.desc:0 "After years of perseverance and dedication, Russia rose from difficult times to restore its greatness and reunite its lost territories. This transformation came through a blend of focused leadership, strategic diplomacy, and careful rebuilding of economy. Leaders prioritized strengthening national identity, investing in education and technological innovation, and reviving key industries, which laid the foundation for a resilient and prosperous nation. With stability came a strong network of international allies, whose support was vital in securing peaceful negotiations to reclaim historical lands.\n\nThe people, united by a shared history and vision, rallied around this cause, fostering a deep sense of national pride and purpose. Gradually, territories that had once been symbols of loss and struggle were peacefully re-integrated, bringing back cherished cultural and historical landmarks. This period of restoration marked a defining chapter in the nation's history, demonstrating that through resilience, unity, and strategic vision, a nation can rise to reclaim not only its lands but also its rightful place on the world stage."
russ.21.a:0 "Long live new Russia!"
russ.22.t:0 "Russian Revival"
russ.22.desc:0 "Despite the collapse of the Soviet Union, the United States continues policies aimed at weakening Russia. We tried to be friends with Western world. As a result we lost half of our country, our national pride, we refused communist ideology. We proposed peace. Nevertheless, NATO expands toward Russia’s borders, USA supports anti-Russian sentiments and regime changes in neighboring states.\n\nWe proposed friendship, but they refused.Now it is time for Russia to revive its national unity and to think about its own interests.\n\nYes, we are occupiers. Once Russia occupied Siberia. Now there are mines and oil rigs. Now there are cities and kindergartens and hospitals. Now you can't sell women there for a bundle of sable pelts, as it was before the Russians.\nWe occupied Central Asia. In the bare steppes, we built canals, factories, cosmodromes, schools and stadiums. There we produced space rockets and airplanes, developed industry, grew wheat and cotton for the whole country. I was asked to leave. Now hemp is being grown there with the help of American loans, and part of the population has gone to work on the construction sites of the former occupiers.\n\nYes, we are an occupiers, and we are tired of apologizing for it. We have our own values and we do not care about West anymore. Russia has its own interests."
russ.22.a:0 "Tensions are growing.."
russ.23.t:0 "The Oligarchy Question"
russ.23.desc:0 "The new liberal-democratic government of Russia faces a crucial decision: what to do with the oligarchs who have controlled the country’s economy for decades? Their influence remains strong, and many are willing to cooperate as long as their interests are not threatened. However, the government could attempt to curb their power, which might either strengthen the state or lead to unforeseen consequences."
russ.23.a:0 "Attempt to weaken their influence"
russ.23.b:0 "Work with Them"
russ.24.t:0 "The Defence of Moscow"
russ.24.desc:0 "The enemy stands at the doorstep of Moscow once again. Sirens echo across the skyline, and the grey clouds above the Kremlin mirror the heaviness in every citizen’s heart. But Russia has been here before. In 1941, against all odds, our grandfathers dug trenches in frozen soil, stood firm in the face of overwhelming force, and repelled a brutal invader from the West. Now, their descendants—clad in modern armor, wielding drones and Kalashnikovs instead of Mosins—stand ready to do the same. \n\nThe Metro is no longer just public transport; it is shelter, supply line, and symbol of endurance. Civilians volunteer for logistics. Veterans share stories with young recruits. The spirit of the Great Patriotic War lives on—not in museums, but in the grit of every defender holding the line.\n\nThis is not just a battle for land. This is a battle for memory, for identity, for the soul of Russia. And as before, wide is our Motherland, but there is nowhere to escape - Moscow is behind us!."
russ.24.a:0 "Russians dont surrender"
russ.25.t:0 "The Future of Novorossia"
russ.25.desc:0 "With the war in Ukraine concluded and Novorossiya firmly under our influence, the question of governance arises. Should we fully integrate these lands into the Russian Federation, securing direct control over their resources and people? Or should we allow Novorossiya to develop as an autonomous entity, fostering loyalty through independence while maintaining our overarching dominance?"
russ.25.a:0 "Russia Should be United"
russ.25.b:0 "Let them be"
russ.26.t:0 "Wagner PMC Center in Saint-Petersburg"
russ.26.desc:0 "With the slow but steady ascent of Wagner's influence within the Russian state apparatus, today marks a pivotal milestone — the grand opening of the Wagner PMC Center in St. Petersburg. Framed by towering granite pillars and veiled in both mystery and military precision, the center symbolizes more than just a headquarters; it is the beating heart of a growing parallel power.\n\nOstensibly a training, recruitment, and coordination hub, the center is also a political statement. While the Kremlin maintains its public distance, behind closed doors, loyalties are being tested and redrawn.\n\nWith control of this new facility, we must now decide how to best leverage its potential — bolster Wagner’s political hand, or field another unit of hardened mercenaries ready for foreign or domestic deployments."
russ.26.a:0 "Wagner must grow stronger within"
russ.26.b:0 "We need boots on the ground"
russ.27.t:0 "The March of Justice Triumphs"
russ.27.desc:0 "It began as a mutiny. Then it became a march. Now, it is a revolution.\n\nIn a stunning and audacious display of force, Wagner columns have pierced through loyalist defenses, reaching Moscow in record time. The state’s response — fragmented, paralyzed, or outright complicit — proved incapable of halting the advance. Government ministries stand abandoned or occupied. Key military commanders have defected or disappeared. The Kremlin is silent.\n\nYevgeny Prigozhin, flanked by his inner circle of commanders and mercenary loyalists, has declared the formation of a new transitional authority "to restore justice and strength to the Russian nation." Whether the people see him as savior or usurper matters little now. Power has changed hands — not through ballots or backroom deals, but at the barrel of a gun."
russ.27.a:0 "§RRussia now answers to Wagner§!"
russ.27.b:0 "§GChechnya will be free again!§!"
russia_news.5.t:0 "Wagner takes control over Moscow"
russia_news.5.d:0 "In a dramatic turn of events that has stunned the international community, the Russian Federation has fallen under the control of the Wagner Private Military Company. After a lightning-fast march toward Moscow — dubbed the March of Justice by Wagner's leadership — regular military resistance crumbled or failed to materialize.\n\nBy dawn, armored columns bearing the Wagner insignia were photographed outside the Kremlin, and reports indicate that key government officials have either fled, been detained, or pledged allegiance to the new regime. Yevgeny Prigozhin, the controversial head of Wagner, has proclaimed the establishment of a new transitional administration aimed at restoring order, sovereignty, and dignity to the Russian state."
russia_news.5.a:0 "Russia now answers to Wagner"
russ.28.t:0 "A Man of Ambition: Prigozhin's Proposal"
russ.28.desc:0 "Yevgeny Prigozhin — once known as a restaurateur and Kremlin insider — has steadily transformed himself into a key figure in Russia’s shadow operations. With deep ties to military leadership, intelligence networks, and elite business circles, Prigozhin now proposes something far more ambitious: the official creation of a private military company under his direct control — Wagner.\n\nOstensibly designed for "overseas deniable operations and crisis response," the Wagner Group would operate beyond the formal chain of command, offering Moscow plausible deniability while expanding Russian influence abroad.\n\nBut giving one man unchecked control over a private army is a dangerous game. Prigozhin’s growing ego, popularity among veterans, and ties to political hardliners could one day turn this asset into a threat. The Kremlin must decide: empower him, contain him, or reject the idea entirely and reform the Ministry of Defence through more traditional means."
russ.28.a:0 "§RLet him form Wagner with full autonomy§!"
russ.28.b:0 "Allow Wagner, but under state oversight"
russ.28.c:0 "§GRelocate Funds to Defence ministry instead§!"
russ.29.t:0 "New Defence Minister"
russ.29.desc:0 "Following the Wagner Group's consolidation of power, the new leadership has announced a major restructuring of the Russian military command. The current Defence Minister, Igor Sergeyev, is widely viewed as a political appointee from the previous era—lacking the combat experience and ideological alignment necessary for the current climate of internal conflict and modernization.\n\nWith the need for a strong, decisive leader to oversee the ongoing counter-insurgency operations and military reforms, three key candidates have emerged:\n\nAlexey Dyumin: A close associate of Yevgeny Prigozhin and former bodyguard of President Putin, Dyumin is seen as a loyalist to the new Wagner-aligned order. He is favored for his unwavering commitment to the regime and experience in special operations.\n\nSergey Shoigu: A longtime figure in Russian security politics, Shoigu is viewed as a competent and loyal reformer. He offers administrative experience and stability but is seen by some as too connected to the old guard.\n\nValery Gerasimov: The current Chief of the General Staff, Gerasimov is a career officer and skilled staff planner. He is respected within military circles for his strategic mind but lacks strong political ties to Wagner's leadership.\n\nThe appointment will signal the strategic direction of the new regime: whether it will prioritize loyalty, bureaucratic efficiency, or military expertise. The decision is expected imminently."
russ.29.a:0 "Alexey Dyumin"
russ.29.b:0 "Sergey Shoigu"
russ.29.c:0 "Valery Gerasimov"
 russ.30.t:0 "Systemic Rot in the Defence Ministry"
 russ.30.desc:0 "The Wagner Group’s consolidation of power has exposed deep and widespread corruption within the Russian Ministry of Defence. A confidential internal review ordered by Prigozhin’s inner circle has uncovered embezzlement, bribery, and gross incompetence at the highest levels—compromising military readiness during a time of critical instability.Two options lie before the leadership:\n\nAuthorize Wagner security units to arrest, try, and publicly sentence the most corrupt officers—including several generals and logistics directors. This will send a clear message that disloyalty and greed will not be tolerated, and ensure that all future resources are directed toward loyal and effective units.\n\nAvoid a large-scale purge that might further destabilize the command structure. Instead, reassign compromised officers to non-critical posts and install Wagner commissars within all departments to monitor spending and compliance."
 russ.30.a:0 "Full Purge – Root Out the Corruption"
 russ.30.b:0 "Limited Reforms"
 russ.31.t:0 "Regional Resistance to Security Reforms"
 russ.31.desc:0 "The old governors speak of legality while they hoard power like feudal princes. Since Wagner seized Moscow, regional machines have slowed directives, hidden funds, and tested whether the new center has the will to punish disobedience.\n\nRussia will not be ruled by provincial barons. We either break this resistance with a visible security strike, or buy time by binding local elites to the new order with contracts, guarantees, and carefully measured concessions."
 russ.31.a:0 "Break Their Resistance by Force"
 russ.31.b:0 "Co-opt Local Elites for Now"
 russ.32.t:0 "The Wagner Economic Doctrine"
 russ.32.desc:0 "The Wagner government must decide what kind of victory economy Russia will build. Commanders demand steel, shells, and mobilization now, arguing that prestige comes from strength and strength comes from production. Civil administrators warn that a nation cannot march forever if cities stagnate and households feel only sacrifice.\n\nThis choice defines our state doctrine: a hard war engine first, or a slower stabilization that secures depth before acceleration."
 russ.32.a:0 "Prioritize Rearmament and War Readiness"
 russ.32.b:0 "Stabilize Civilian Sector First"
 russ.33.t:0 "Rosguard Expansion Budget Crisis"
 russ.33.desc:0 "Rosguard expansion has become the spine of regime security, but the treasury is already bleeding. Commanders insist that every delay invites sabotage, protest cells, and elite conspiracy in the rear. Economists reply that uncontrolled spending will hollow out legitimacy and trigger exactly the unrest we seek to prevent.\n\nWe can flood the apparatus with emergency money and lock down the streets, or impose discipline and accept a slower but steadier consolidation."
 russ.33.a:0 "Fund Emergency Expansion Immediately"
 russ.33.b:0 "Keep Expansion Controlled"
 russ.34.t:0 "Intelligence Recruitment Standards"
 russ.34.desc:0 "The new state needs eyes everywhere, but loyalty and competence do not grow at the same speed. Veteran cadres demand strict screening, ideological reliability, and long training pipelines. Reformists push for mass recruitment, digital tools, and rapid deployment before hostile networks regroup.\n\nOne model builds a tight elite service with fewer leaks. The other creates scale fast, but invites infiltration, mistakes, and political blowback."
 russ.34.a:0 "Professional Cadres over Quantity"
 russ.34.b:0 "Mass Recruitment and Rapid Training"
 russ.35.t:0 "Digital Iron Curtain Implementation"
 russ.35.desc:0 "The Digital Iron Curtain is ready for activation. Hardliners call for near-total isolation, arguing that information sovereignty is as vital as border security. Industrial managers counter that total closure will choke research, software access, and modernization at the exact moment Russia must outbuild its rivals.\n\nWe can seal the network and rule by strict informational control, or maintain narrow gateways and accept a constant counterintelligence battle."
 russ.35.a:0 "Seal the Network and Isolate"
 russ.35.b:0 "Allow Controlled Gateways"
 russ.36.t:0 "The Corporate Compact"
 russ.36.desc:0 "If we choose the corporate path, we must decide who gets rich under Wagner rule. Loyal conglomerates offer immediate capital, logistics, and foreign channels, but demand protection and political immunity in return. Reform-minded officials warn that replacing old oligarchs with new ones will poison the system from within.\n\nThe first contracts of the new era will show whether this state rewards useful allies, or builds a cleaner economy that can survive beyond emergency rule."
 russ.36.a:0 "Back Loyal Conglomerates"
 russ.36.b:0 "Launch an Anti-Monopoly Audit"
 russ.37.t:0 "Command Economy Production Quotas"
 russ.37.desc:0 "Command Economy planners demand emergency quotas across strategic industry, framing this as a patriotic duty in a time of national struggle. Military command supports compulsory targets and direct coercion to guarantee output. Plant managers warn that unrealistic figures will distort production, burn labor discipline, and create hidden shortages.\n\nWe can impose a hard mobilization economy immediately, or enforce tighter but realistic benchmarks that preserve long-term capacity."
 russ.37.a:0 "Impose Emergency Quotas"
 russ.37.b:0 "Adopt Realistic Planning Targets"
russ.38.t:0 "The First Days of Wagner Rule"
russ.38.desc:0 "The coup succeeded, but governance begins where slogans end. Ministries are frightened, chains of command are broken, and every institution is testing whether Wagner rule is temporary or permanent. At the same time, internal security reports warn of a credible threat of a major terrorist attack during this transition window.\n\nPragmatists urge us to keep experienced administrators to avoid paralysis. Radicals demand immediate purges and rule through loyal security cadres alone. Whatever line we choose, the state must move fast to pacify the North Caucasus and tighten control over internal affairs before hostile networks strike."
russ.38.a:0 "Co-opt the Old Bureaucracy"
russ.38.b:0 "Purge and Centralize Power"
 russ.39.t:0 "Aftermath of the CSTO Collapse"
 russ.39.desc:0 "The old CSTO shell has cracked, and every capital in the post-Soviet space is recalculating. Some commanders see this as a historic opening to impose a new Russian order by pressure and shock. Others warn that maximal coercion now could unite hostile neighbors before our rear is fully secure.\n\nOur signal in this moment will define whether the Wagner state is feared as a disciplined hegemon or dismissed as a reckless junta."
 russ.39.a:0 "Show Strength and Set the Tone"
 russ.39.b:0 "Control the Shock Through Diplomacy"
 russ.40.t:0 "The Caucasus Security Dilemma"
 russ.40.desc:0 "The Caucasus remains proud, armed, and unconvinced by proclamations from Moscow. Supply ambushes, local militias, and clan networks are probing the limits of our occupation model. Security hardliners call for full sweeps, detentions, and collective pressure. Political operatives argue that selective deals and controlled co-option can fracture resistance faster.\n\nThe region can be subdued by iron first, or pacified through calibrated bargains under the shadow of force."
 russ.40.a:0 "Crush Resistance with Force"
 russ.40.b:0 "Co-opt Local Power Brokers"
russ.41.t:0 "The Iranian Frontier Question"
russ.41.desc:0 "The southern arc is unstable, and Tehran now sits at the center of our strategic dilemma. Hawkish officers want immediate mobilization and coercive signaling to secure Russian prestige in the region. Economic planners argue that a controlled opening with Iran could lock in energy corridors and avoid another expensive front.\n\nOur decision will show whether Wagner diplomacy is merely armed pressure, or pressure backed by transactional statecraft."
russ.41.a:0 "Offer a Controlled Economic Settlement"
russ.41.b:0 "Attack Iran Head-On"
russ.74.t:0 "Russian Proposal for Strategic Trade Ties"
russ.74.desc:0 "Moscow has proposed a structured economic arrangement: energy-aligned logistics, protected trade corridors, and preferential access channels in exchange for closer strategic coordination. Supporters argue this can stabilize domestic industry under sanctions pressure and unlock predictable growth. Critics warn that accepting the deal deepens dependence on Russian leverage and narrows foreign policy freedom.\n\nTehran must decide whether to embrace immediate economic gains or reject the offer to preserve strategic distance."
russ.74.a:0 "Accept the Trade Proposal"
russ.74.b:0 "Reject Russian Economic Conditions"
russ.78.t:0 "Russian Offer: Trade Partnership"
russ.78.desc:0 "Moscow has proposed a formal trade partnership with strategic industrial clauses. The offer promises reliable access channels and mutually beneficial production coordination, but accepting it will pull us closer to Wagner Russia's economic orbit.\n\nShould we proceed with this trade deal?"
russ.78.a:0 "Accept Trade with Russia"
russ.78.b:0 "Reject the Offer"
russ.79.t:0 "Russian Request on the Mongolian Question"
russ.79.desc:0 "Under the framework of our trade arrangement with Russia, Moscow now asks for political tolerance on the Mongolian file. Russian envoys argue that bringing Mongolia into their security orbit is a regional stabilization measure. Our planners warn that approval may strengthen Russia's military leverage in Northeast Asia.\n\nDo we allow this step?"
russ.79.a:0 "We Will Not Block Russia"
russ.79.b:0 "Reject Russian Move on Mongolia"
russ.80.t:0 "China Refuses on Mongolia"
russ.80.desc:0 "Beijing has rejected our request to tolerate pressure on Mongolia. We can force the issue anyway, but that will terminate our trade arrangement with China. Or we can step back and preserve economic ties."
russ.80.a:0 "Proceed Anyway and End Trade"
russ.80.b:0 "Back Off for Now"
russ.81.t:0 "Expand Trade with Russia?"
russ.81.desc:0 "Moscow proposes a deeper stage of economic integration under the existing trade framework. Supporters argue this will improve industrial planning and construction throughput. Critics warn that further integration increases dependence on Russian leverage.\n\nShould we expand the trade arrangement?"
russ.81.a:0 "Approve Expanded Trade"
russ.81.b:0 "Keep Current Terms"
russ.82.t:0 "Russian Offer: Security Alliance with Aid"
russ.82.desc:0 "Moscow proposes formal entry into its alliance framework under Wagner leadership. In exchange for accession, Russia offers immediate economic support: six civilian factories and a major internal stabilization package.\n\nAccepting secures material benefits and military backing, but narrows strategic autonomy. Rejecting preserves independence, yet leaves Pyongyang outside a potentially decisive power bloc."
russ.82.a:0 "Accept Alliance and Russian Aid"
russ.82.b:0 "Decline the Offer"
russ.83.t:0 "Proposal to Merge Alliances"
russ.83.desc:0 "Moscow proposes a full strategic merger: our alliance network would be integrated into the Russian-led bloc under unified command. Accepting would transfer our faction members into Russia's faction and align us under a single wartime structure. Rejecting keeps the current arrangement unchanged."
russ.83.a:0 "Accept the Merger"
russ.83.b:0 "Reject the Proposal"
russ.42.t:0 "European Sanctions Wave"
russ.42.desc:0 "Thirty days after Wagner tightened its grip on power, democratic governments moved to coordinate sanctions and embargo pressure against Russia. Financial channels are tightening and import substitution is under stress.\n\nWe can launch emergency confiscation and forced economic mobilization to cushion the first impact, or accept a cleaner short-term political hit while avoiding structural disruption."
russ.42.a:0 "Seize Assets and Emergency-Rebuild"
russ.42.b:0 "Absorb the Shock"
russ.75.t:0 "Sanctions Vote on Wagner Russia"
russ.75.desc:0 "Wagner has entrenched itself in Moscow and is consolidating an openly expansionist regime. Allied diplomats propose coordinated embargo pressure to constrain Russian military-financial recovery. Business lobbies warn this will also hurt our own trade flows.\n\nDo we join a sanctions front against Wagner Russia?"
russ.75.a:0 "Impose an Embargo"
russ.75.b:0 "Do Not Join the Embargo"
russ.43.t:0 "The Ukrainian Question"
russ.43.desc:0 "Kyiv remains outside Moscow's control, and the General Staff demands a clear line. Diplomats propose one final coercive settlement: pressure Ukraine into a subordinate status under Russian security guarantees. Hardliners dismiss talks as weakness and call for immediate military preparation.\n\nThe Kremlin must choose whether to force compliance at the negotiating table or on the battlefield."
russ.43.a:0 "Pressure Ukraine Diplomatically"
russ.43.b:0 "Choose the Military Solution"
russ.76.t:0 "Russian Ultimatum to Kyiv"
russ.76.desc:0 "Moscow has delivered a direct ultimatum. Ukraine is offered one path to avoid war: accept Russian supremacy and enter a subordinate status under Kremlin oversight. Refusal means escalation and open confrontation.\n\nThe cabinet now faces a defining decision between sovereignty and survival."
russ.76.a:0 "Accept Russian Terms"
russ.76.b:0 "Refuse and Prepare to Resist"
russ.84.t:0 "The Final Settlement of the Ukrainian Question"
russ.84.desc:0 "Ukraine has accepted Russian terms and now functions under Moscow's authority as a subordinate government. The military objective has been secured; the political architecture must now be decided.\n\nThe Council can preserve a loyal Ukrainian administration for stability and deniability, proceed with full legal integration into the Russian state, or implement a mixed model: reclaim Crimea and the Donbass directly while maintaining a reduced Ukrainian puppet to manage the remaining territory."
russ.84.a:0 "Maintain a Loyal Ukrainian Puppet"
russ.84.b:0 "Implement Full State Integration"
russ.84.c:0 "Reclaim Crimea and Donbass, Keep the Puppet Framework"
russ.77.t:0 "Major Terrorist Attack"
russ.77.desc:0 "Security warnings have turned into reality. A major terrorist attack has struck during the fragile consolidation period, exposing gaps in regional control and internal counter-terror coordination. Public anger is rising, and the leadership now faces pressure to restore order quickly and decisively."
russ.77.a:0 "Order must be restored immediately"
 russ.44.t:0 "Economic Integration Friction"
 russ.44.desc:0 "Integration of the expanded sphere has begun, and the reality is harsher than the map. Customs disputes, legal contradictions, and corruption networks are choking the promised gains of reunification. Centralizers demand immediate harmonization under Moscow command. Administrators warn that excessive speed will break supply chains and governance capacity.\n\nThis phase decides whether our bloc becomes a functioning economic engine or an overextended political project."
 russ.44.a:0 "Push Through Rapid Centralization"
 russ.44.b:0 "Phase Integration Step by Step"
russ.45.t:0 "Lebed's Public Outburst"
russ.45.desc:0 "During an official visit to inspect newly issued combat vehicles, Russian officer Anatoliy Lebed openly declared that the new machines were unfit for real battlefield conditions. His remarks spread quickly through military channels and media circles, embarrassing procurement officials and exposing tension between frontline veterans and defense bureaucrats.\n\nThe leadership must now decide whether to reward blunt battlefield truth, discipline the officer through political-educational work, or dismiss him outright to protect chain-of-command authority."
russ.45.a:0 "Promote Him and Use His Experience"
russ.45.b:0 "Send Him to Political-Educational Work"
russ.45.c:0 "Dismiss Him from Service"
 russ.52.t:0 "Wagner Disinformation Offensive Detected"
 russ.52.desc:0 "US agencies report a coordinated Wagner disinformation wave aimed at social cohesion, electoral trust, and media legitimacy. Deepfake packets and automated influence clusters are already active across major platforms. A hard response can suppress immediate damage, but at high political and institutional cost.\n\nIf we hesitate, the narrative space will be shaped by our adversary."
 russ.52.a:0 "Launch Immediate Counter-Campaign"
 russ.52.b:0 "Monitor and Contain Quietly"
 russ.53.t:0 "Wagner Tech-Siphon Attempt Detected"
 russ.53.desc:0 "American counterintelligence has detected a Wagner-linked cyber siphon targeting defense subcontractor networks. Sensitive data channels are under direct pressure and containment windows are narrowing. A full retaliatory sweep could break the operation, but risks escalation and domestic friction.\n\nThe decision is whether to strike hard now or absorb risk while hardening quietly."
 russ.53.a:0 "Authorize Full Counterintelligence Sweep"
 russ.53.b:0 "Harden Defenses, Avoid Escalation"
 russ.54.t:0 "Wagner Sanctions-Evasion Network Identified"
 russ.54.desc:0 "US financial and intelligence agencies have mapped a deniable procurement network linked to Wagner intermediaries and sanctions-bypass financing. Immediate disruption could cripple the route, but a slower intelligence build might expose the wider architecture behind it.\n\nWashington must choose between fast disruption and a deeper strategic takedown."
 russ.54.a:0 "Disrupt the Network Immediately"
 russ.54.b:0 "Watch and Build a Bigger Case"
 russ.57.t:0 "Psychological Operations Command Online"
 russ.57.desc:0 "Psychological Operations Command is now fully operational under Wagner doctrine. Disinformation cells, cyber teams, and covert economic channels can be synchronized into campaigns that weaken enemies before conventional confrontation begins. Failures will carry real diplomatic and security costs, but success can bend the strategic balance without open war.\n\nThis is modern power: narratives as artillery, data as sabotage, and fear as force multiplier."
 russ.57.a:0 "Open the Operations Desk"
 russ.58.t:0 "Who Leads the Wagner State?"
 russ.58.desc:0 "Moscow is in Wagner hands, but victory has only opened the final struggle for command. Prigozhin's camp demands centralized personal authority, state discipline, and pragmatic authoritarian rule. Utkin's faction calls for total ideological mobilization and a harder nationalist order built around myth, steel, and exclusion.\n\nThe next signature on the orders will define not just who governs Russia, but what kind of Wagner state history will remember."
 russ.58.a:0 "Prigozhin Leads the State"
 russ.58.b:0 "Utkin Leads the State"
 russ.59.t:0 "The Turkmen Governorate Model"
 russ.59.desc:0 "Turkmen territory is now under our control, but control is not yet authority. One option is to install a loyal governorate structure that carries our line while reducing day-to-day administrative burden. The other is direct military-bureaucratic rule until local compliance is forced upward by pressure and institutional penetration.\n\nWe must choose between manageable delegation and uncompromising direct control."
 russ.59.a:0 "Create a Turkmen Client Administration"
 russ.59.b:0 "Rule Directly and Build Compliance"
 russ.60.t:0 "The Caucasus Administrative Settlement"
 russ.60.desc:0 "The Caucasus is fractured, armed, and politically volatile. We can build a ring of dependent local administrations under strict Moscow oversight, using controlled autonomy to divide and manage resistance. Or we can retain direct command authority and grind opposition down through long occupation structures.\n\nEither path can secure the region, but each demands a different mix of force, patience, and political cost."
 russ.60.a:0 "Form Loyal Caucasus Puppets"
 russ.60.b:0 "Keep Direct Rule and Raise Compliance"
 russ.61.t:0 "Mission Complete: The Forge of the New Army"
 russ.61.desc:0 "The first major deadline of the Wagner state has been met. Recruitment centers remain crowded, reserve depots are active through the night, and military planners now report that force concentration targets have been achieved ahead of hostile expectations.\n\nState media presents the result as proof that Russia has left weakness behind. Behind closed doors, commanders are more direct: this was not ceremony, but preparation for a long era of confrontation."
 russ.61.a:0 "The Army Is Ready"
 russ.62.t:0 "Mission Failed: Cracks in Mobilization"
 russ.62.desc:0 "The buildup schedule has slipped. Quotas were announced, but not met; deliveries were promised, but delayed. Regional staffs blame each other while opposition channels quietly amplify every shortfall.\n\nFor a regime that built its legitimacy on force and discipline, failure in military mobilization is more than a bureaucratic error. It is a warning that the state can still be resisted from within."
 russ.62.a:0 "Reassert Control by Any Means"
 russ.63.t:0 "Mission Complete: Internal Front Secured"
 russ.63.desc:0 "Security directorates report synchronized progress across the country: communication channels hardened, hostile organizers detained, and critical institutions placed under tighter supervision. The Digital Iron Curtain is now more than a slogan; it is becoming architecture.\n\nWagner leadership frames this as a historic correction. In their words, Russia cannot restore its power abroad until disloyalty at home is caged and contained."
 russ.63.a:0 "No Room for Hesitation"
 russ.64.t:0 "Mission Failed: The State Leaks"
 russ.64.desc:0 "The internal consolidation campaign has stalled. Operational directives were intercepted, local administrations hesitated, and elements inside the apparatus chose self-preservation over discipline. The result is not open revolt, but a dangerous bleed of authority.\n\nIn the Wagner narrative, this is betrayal in slow motion. The state still stands, but enemies now believe it can be pressured, infiltrated, and outwaited."
 russ.64.a:0 "Tighten the Net"
 russ.65.t:0 "Mission Complete: Economy Stabilized"
 russ.65.desc:0 "After months of forced restructuring, the economic machine is responding. Industrial schedules are cleaner, supply channels are less chaotic, and the regime can finally claim that emergency governance has produced measurable order.\n\nOfficials call it the end of improvisation. Propaganda presents this as the birth of a disciplined national economy capable of supporting Russia's return to great-power status."
 russ.65.a:0 "Production Is Power"
 russ.66.t:0 "Mission Failed: Recovery Under Strain"
 russ.66.desc:0 "The stabilization plan has fallen behind. Enterprises report procurement bottlenecks, regional managers conceal deficits, and the promised recovery pace remains uneven. The economy continues to function, but without the confidence the leadership demanded.\n\nFor Wagner's political line, this is a strategic setback: prestige abroad depends on strength at home, and strength at home depends on factories that do not stall."
 russ.66.a:0 "Push Harder"
 russ.67.t:0 "Mission Complete: Fleet Rearmament Advances"
 russ.67.desc:0 "Shipyards report completed milestones and naval command confirms that rearmament directives are now translating into real capability. Training cycles accelerate as crews move from theory to deployment readiness.\n\nThe message from Moscow is clear and deliberate: Russia's reach will not end at land borders. Maritime power is returning, and with it, the promise of pressure far beyond the near abroad."
 russ.67.a:0 "The Fleet Returns"
 russ.68.t:0 "Mission Failed: Rearmament Delayed at Sea"
 russ.68.desc:0 "Dockyard output missed targets and command inspections found readiness gaps across key formations. Admiralty staff offers technical explanations, but the political result is simple: expectations were set publicly and not fulfilled.\n\nIn the wider struggle for legitimacy, missed naval deadlines feed the narrative that Wagner can seize power faster than it can modernize a state. That narrative must be broken quickly."
 russ.68.a:0 "Correct It Immediately"
 russ.69.t:0 "Doctrine of Unified Command"
 russ.69.desc:0 "With Wagner and Ministry structures formally merged, the next battle is inside the command rooms. One camp demands a strict single chain of command under Wagner loyalists, arguing that speed and obedience win modern wars. Another camp warns that total purges of legacy officers may damage professionalism and reduce operational flexibility.\n\nThe choice is not between strength and weakness, but between different kinds of strength: tighter control from above, or a broader officer compromise that keeps the machine stable while it adapts."
 russ.69.a:0 "Enforce a Single Wagner Command Chain"
 russ.69.b:0 "Keep a Controlled Officer Compromise"
 russ.70.t:0 "Aerospace Modernization Priorities"
 russ.70.desc:0 "The air arm is no longer a supporting branch; it is a strategic lever for deterrence, shock, and survival. Procurement boards now split over priorities. Strike advocates want immediate offensive capability through precision aviation, drones, and rapid sortie doctrine. Defensive planners insist that survivability, training quality, and layered protection must come first if we expect a long conflict horizon.\n\nEither approach can serve Russia's revival, but only one can be prioritized with current resources."
 russ.70.a:0 "Prioritize Offensive Strike Capability"
 russ.70.b:0 "Prioritize Air Defense and Pilot Quality"
 russ.71.t:0 "Direction of Naval Reorganization"
 russ.71.desc:0 "Fleet reform has begun, and the Admiralty demands a strategic decision. Surface-command officers push for visible maritime presence, blue-water patrols, and symbolic power projection that signals Russia's return. Naval economists and submarine staff argue for a leaner denial fleet focused on attrition, coastal leverage, and lower political cost.\n\nThe fleet cannot be everything at once. We choose either prestige and wider reach, or restraint with sharper efficiency."
 russ.71.a:0 "Build a Surface Presence Fleet"
 russ.71.b:0 "Build a Denial-Oriented Fleet"
russ.72.t:0 "Innovation Doctrine of the New Army"
russ.72.desc:0 "Victory on paper is no guarantee of victory in the field. After the expansion of the Grand Army program, staff officers now argue over whether Wagner command should formalize a military innovation doctrine at the highest level. Reform-minded commanders demand faster adaptation, integrated drone-artillery loops, and doctrine built for modern high-intensity warfare. Traditionalists warn that constant experimentation can fracture discipline and overcomplicate command.\n\nThree lines have emerged: a hard innovation push led from the top, a conservative command model centered on proven doctrine, or a hybrid transition that tests new methods while preserving institutional balance."
russ.72.a:0 "Institutionalize Military Innovation"
russ.72.b:0 "Preserve a Conservative Command Culture"
russ.72.c:0 "Adopt a Hybrid Reform Program"
russ.73.t:0 "Authour does not support any political extremism!"
russ.73.desc:0 "The author of this modification, and especially its Russian content, does not support political extremism, radical movements, or unlawful organizations within Russia in any form. This project stands for respect for the Constitution of the Russian Federation, the preservation of constitutional order, and the rejection of violence and hatred in political life. We urge all players to condemn political extremism, oppose radicalization, support lawful democratic governance, and uphold the constitutional foundations of the Russian state."
russ.73.a:0 "I have read the event and understand that extremism is bad"
 russia_wagner_news.1.t:0 "Chaos in the Caucasus"
 russia_wagner_news.1.d:0 "With Wagner’s sudden seizure of Moscow, the fragile balance in the North Caucasus has collapsed. Chechen loyalists, separatist fighters, and local warlords are clashing with Wagner units, while abandoned depots fuel fresh insurgencies.\n\nMeanwhile, Russia’s army suffers from deep disorganization. The old chain of command has shattered, with generals dismissed, defected, or simply refusing to acknowledge Wagner’s authority. Logistics grind to a halt, and reports of desertion grow daily."
russia_wagner_news.1.a:0 "Send Wagner battalions to pacify the Caucasus"
russia_wagner_news.2.t:0 "Separatist movement in Central Russia"
russia_wagner_news.2.d:0 "The legitimate regional governments of Tatarstan and Bashkortostan were today overthrown by armed nationalist groups. These forces, taking advantage of the nation's ongoing instability, have seized government buildings in Kazan and Ufa and declared independence from Russia.\n\nMoscow has denounced these actions as illegal and ordered all loyal security forces in the region to detain those responsible. The situation remains highly volatile as it's unclear how local security forces will respond to these developments."
russia_wagner_news.2.a:0 "Death to traitors"
russia_wagner_news.3.t:0 "Separatists are victorious"
russia_wagner_news.3.d:0 "In a stunning reversal, forces loyal to the independence movement have announced full control of the regional capitals, Ufa and Kazan, following the retreat of Wagner PMC units and Federal forces. The success of separatists will likely embolden opposition movements across Russia's diverse regions and potentially open avenues for the separatist government to seek unofficial foreign support. The future remains uncertain, but the fall of a major regional capital to separatists signals a critical fracture in the authority of the central Russian state."
russia_wagner_news.3.a:0 "We will deal with those traitors"
russia_wagner_news.4.t:0 "Separatist rebellion is crushed"
russia_wagner_news.4.d:0 "After a long siege and a final, devastating assault, Wagner units and Federal Forces have crushed the separatist government in Tatarstan and Bashkortostan and restored Moscow's control over the regional capitals.\n\nThe final Wagner offensive involved a massive shelling of separatist strongholds on the city's periphery before armored columns pushed into the urban center. Communication from within the city was largely cut off during the operation, but intercepted militia radio transmissions spoke of being overwhelmed by superior firepower and numbers."
russia_wagner_news.4.a:0 "Order restored"
russia_wagner_news.5.t:0 "Unrest in Saint-Petersburg"
russia_wagner_news.5.d:0 "St. Petersburg, the historic cradle of Russian revolutions, has become the latest flashpoint in the nation’s escalating instability. Militant communist groups have organized large-scale strikes and protests across the city’s industrial and port districts. Invoking the memory of the 1917 October Revolution, these groups condemn the Wagner-controlled regime as a corrupt and illegitimate puppet of oligarchic interests.\n\nThe protests have grown increasingly confrontational, with demonstrators clashing violently with local police. Factory workers, students, and disillusioned veterans have joined the movement, demanding the restoration of social programs, nationalization of privatized industries, and an end to mercenary rule."
russia_wagner_news.5.a:0 "Send in more forces"
russia_wagner_news.6.t:0 "Communists are victorious"
russia_wagner_news.6.d:0 "In a stunning reversal, communist coalition forces and defecting army units have announced full military control over St. Petersburg, forcing a full retreat of Wagner PMC and loyalist security forces to the city's outskirts.\n\nThe victory, secured after fierce street-by-street fighting, marks the first time in 21 century a major Russian metropolis has fallen completely to an internal opposition force. The rebels have established a new revolutionary government, immediately nationalizing key industries and distributing stockpiled food.\n\nWagner's withdrawal appears to be a strategic decision to avoid a protracted urban siege. The fall of the Northern Capital is a catastrophic blow to the Moscow regime's authority."
russia_wagner_news.6.a:0 "We will crush these extremists"
russia_wagner_news.7.t:0 "Communist rebellion is crushed"
russia_wagner_news.7.d:0 "A swift and decisive joint operation by loyal Internal Troops, Army units, and Wagner PMC detachments has successfully neutralized the attempted insurrection in St. Petersburg. The so-called communists, a fringe group of extremist agitators and foreign-sponsored provocateurs, has been utterly dismantled after attempting to seize key infrastructure.\n\nThe operation, which involved precise strikes on identified militant strongholds in the Vyborgsky and Kirovsky districts, concluded with the surrender or elimination of the rebel leadership. While minor, isolated skirmishes may continue, the back of the rebellion has been broken. The city is now under a stabilized security regime, with curfews lifted and order fully restored."
russia_wagner_news.7.a:0 "Order restored"
russia_wagner_news.8.t:0 "Wagner Commanders Join Russian Military"
 russia_wagner_news.8.d:0 "Following the decisive and successful suppression of rebel forces in St. Petersburg, the Russian Ministry of Defence has formally announced the integration of senior Wagner Group commanders into the official armed forces structure.\n\nKey Wagner leaders, including veterans of several recent domestic stability campaigns, have been granted official military ranks and positions within the Special Operations Command and the National Guard.The integration is seen as a step toward consolidating state control over all armed entities operating within Russia's borders, ensuring a unified chain of command for future domestic security operations."
 russia_wagner_news.8.a:0 "Good"
 russ.85.t:0 "Mali: A New Security Axis"
 russ.85.desc:0 "The new Wagner leadership in Moscow presents its African line as a direct challenge to the old Western order. Russian envoys argue that French missions and EU programs promised stability but delivered dependency, debt, and selective sovereignty. Their offer is explicit: no lectures, no constitutional engineering, no moralizing diplomacy - only security results.\n\nFor Mali, Stage One means Wagner instructors, convoy-defense teams, and operational advisers embedded with our command. Moscow frames this as the opening move of an anti-colonial military partnership that weakens Western influence across the Sahel while giving Bamako immediate battlefield capacity."
 russ.85.a:0 "Accept the Anti-West Security Mission"
 russ.85.b:0 "Reject and Keep Distance from Moscow"
 russ.86.t:0 "Mali: Strategic Realignment with Wagner Russia"
 russ.86.desc:0 "With first-stage cooperation in place, Russia now offers a second-stage compact: deeper Wagner structures, synchronized security planning, and long-term economic coordination under preferential terms. The Kremlin calls it a 'sovereign partnership' designed to replace French leverage with Russian backing.\n\nSupporters claim this secures the regime, upgrades force readiness, and gives Mali stronger bargaining power against Western pressure. Critics warn that one patron is simply replacing another. The decision will define whether Mali becomes a key pillar of the new Russian-African bloc."
 russ.86.a:0 "Sign the Full Strategic Partnership"
 russ.86.b:0 "Refuse Deeper Integration"
 russ.87.t:0 "Burkina Faso: Moscow's Sahel Offer"
 russ.87.desc:0 "Wagner envoys describe the Sahel as the proving ground of a new world order: Western military umbrellas on one side, sovereign anti-colonial security partnerships on the other. Russia offers Burkina Faso a first-stage package of military instruction, facility protection, and command-level advisory support.\n\nThe proposal is marketed as faster, harsher, and less political than French-style cooperation. Acceptance would openly signal that Burkina Faso is ready to erode Western security influence and align with the Wagner doctrine of force-first stabilization."
 russ.87.a:0 "Accept Stage One Cooperation"
 russ.87.b:0 "Reject the Russian Track"
 russ.88.t:0 "Burkina Faso: Stage Two Integration Terms"
 russ.88.desc:0 "Moscow has moved from tactical cooperation to strategic architecture. Stage Two offers expanded Wagner presence and formal economic-security alignment, presented as better terms than Western frameworks and fewer political strings than Paris or Brussels.\n\nIn Russian messaging, this is not just a contract - it is a geopolitical declaration that Burkina Faso belongs to a rising anti-Western partnership. Accepting means stronger backing and faster coercive capacity, but also deeper insertion into Russia's long game in Africa."
 russ.88.a:0 "Approve Full Expansion"
 russ.88.b:0 "Stop at Limited Cooperation"
 russ.89.t:0 "Niger: Wagner's First-Stage Proposal"
 russ.89.desc:0 "Russian negotiators position Niger as a frontline state in the contest between old colonial influence and emerging sovereign blocs. They argue that Western security guarantees have become expensive, conditional, and strategically unreliable. Stage One offers Wagner training cells, rapid-response advisers, and base-security support.\n\nFor Moscow, each accepted mission weakens the Western strategic map in West Africa. For Niger, acceptance brings immediate military utility and a clear diplomatic shift away from the French-centered order."
 russ.89.a:0 "Accept Stage One Deployment"
 russ.89.b:0 "Decline the Offer"
 russ.90.t:0 "Niger: Proposal for Deep Strategic Alignment"
 russ.90.desc:0 "After initial success, Russia proposes a broader framework: expanded Wagner structures, integrated planning channels, and economic-security coordination under preferential bilateral terms. The package is sold as an alternative to Western dependency and a path to autonomous hard power under Russian cover.\n\nMoscow's objective is transparent: lock Niger into a durable anti-West axis in the Sahel. Niger's objective is survival, leverage, and capacity. Whether those aims remain aligned will depend on this decision."
 russ.90.a:0 "Accept Full Alignment Terms"
 russ.90.b:0 "Reject Stage Two"
 russ.91.t:0 "Chad: Russian Security Bloc Invitation"
 russ.91.desc:0 "The Wagner state now presents Chad with a first-stage security mission and a political narrative: Africa must no longer rent its security from former colonizers. Russian officials claim their model offers practical force support without Western ideological conditionality.\n\nThe immediate package includes advisers, convoy protection, and tactical training support. Behind it lies a broader strategic intent - to push France and its partners out of regional command space by replacing them country by country."
 russ.91.a:0 "Accept the First-Stage Mission"
 russ.91.b:0 "Reject Moscow's Offer"
 russ.92.t:0 "Chad: Stage Two Russian Partnership"
 russ.92.desc:0 "Moscow now requests long-term consolidation: expanded Wagner institutions, integrated security governance, and economic coordination tied to strategic loyalty. Russian envoys call it a fairer system than French influence networks, with clearer security delivery and fewer domestic political demands.\n\nAcceptance would strengthen regime durability and military tempo. It would also move Chad firmly into Russia's continental balancing strategy against Western power."
 russ.92.a:0 "Approve Stage Two Consolidation"
 russ.92.b:0 "Refuse Further Commitments"
 russ.93.t:0 "Cote d'Ivoire: First-Stage Wagner Offer"
 russ.93.desc:0 "Russia approaches Cote d'Ivoire with a calibrated first-stage package: military advisers, protective detachments, and command-support teams. Moscow frames this as the opening of a post-colonial security model meant to outcompete French influence with harder guarantees and transactional clarity.\n\nThough presented as limited cooperation, the offer is politically significant. Accepting signals that Abidjan is willing to test an alternative pole of power in West Africa while helping Moscow chip away at Western strategic depth."
 russ.93.a:0 "Accept Initial Wagner Cooperation"
 russ.93.b:0 "Reject the First-Stage Offer"
 russ.94.t:0 "Cote d'Ivoire: Expanded Resource-Security Pact"
 russ.94.desc:0 "Stage Two moves from advisers to architecture. Russia proposes expanded Wagner presence and a resource-linked economic-security agreement, promising stronger regime protection and privileged bilateral terms compared to traditional Western contracts.\n\nUnder the draft terms, Russia receives formal resource rights in §YSassandra§! and §YAbidjan§! in exchange for the expanded package. The Kremlin's logic is simple: security partnership plus resource access equals long-term geopolitical foothold. For Cote d'Ivoire, the pact can deliver immediate leverage and military backing, but at the cost of embedding Russian strategic claims into national economic planning."
 russ.94.a:0 "Sign the Expanded Pact"
 russ.94.b:0 "Reject Strategic Expansion"
 russ.95.t:0 "Central African Republic: Wagner Stage One"
 russ.95.desc:0 "Moscow portrays the Central African Republic as a symbol of Africa's break from Western tutelage. The first-stage offer includes convoy security, base defense, and combat-advisory teams under direct Wagner coordination. Russian envoys promise decisive force support where UN and Western frameworks delivered delays.\n\nAccepting this package strengthens immediate coercive capability and aligns Bangui with Russia's anti-West continental narrative. Refusing keeps strategic flexibility but preserves existing security fragility."
 russ.95.a:0 "Authorize Stage One Deployment"
 russ.95.b:0 "Decline the Russian Offer"
 russ.96.t:0 "Central African Republic: Stage Two Integration"
 russ.96.desc:0 "Russia now seeks a deeper settlement: expanded Wagner institutional role, integrated internal-security planning, and long-range economic coordination under Moscow-backed guarantees. It is marketed as a sovereignty-preserving alternative to Western pressure politics.\n\nIn practice, this is a strategic lock-in arrangement. It can harden state control and deter hostile actors, while making the country a core node in Russia's effort to erode French and broader Western influence in Central Africa."
 russ.96.a:0 "Accept Full Strategic Integration"
 russ.96.b:0 "Reject the Second Stage"
 russ.97.t:0 "Gabon: First-Stage Russian Security Offer"
 russ.97.desc:0 "Gabon has received a first-stage proposal from Wagner Russia: tactical instruction programs, critical-site security teams, and advisory channels for rapid force modernization. Moscow frames the offer as a practical and respectful partnership unlike Western models that tie assistance to political compliance.\n\nAcceptance helps Russia widen its anti-West arc from the Sahel toward the Gulf of Guinea. For Gabon, it delivers near-term military gains and a new external patron capable of hard-power backing."
 russ.97.a:0 "Accept Stage One Partnership"
 russ.97.b:0 "Decline the Offer"
 russ.98.t:0 "Gabon: Resource and Security Alignment Pact"
 russ.98.desc:0 "With initial cooperation established, Russia proposes Stage Two: enlarged Wagner structures, economic-security synchronization, and strategic resource cooperation under bilateral priority terms. Moscow presents this as fairer than legacy Western extraction systems and more reliable in crisis conditions.\n\nThe proposed protocol grants Russia resource rights in §YGabon§! as part of the package. The agreement offers protection, leverage, and accelerated security support - but also places Gabon inside a declared geopolitical project aimed at weakening Western influence and building a Russian-centered African network."
 russ.98.a:0 "Enter Full Alignment with Moscow"
 russ.98.b:0 "Refuse Stage Two Integration"
 russ.99.t:0 "Narcotics Crisis Along the Southern Corridor"
 russ.99.desc:0 "Emergency reporting from border command, transport security directorates, and regional administrations confirms what many feared but few were ready to admit: a large narcotics corridor from Afghanistan has accelerated through Central Asia and is now striking deep into Russian territory. What began as scattered smuggling routes has hardened into a resilient transnational system - protected by corruption, financed by organized crime, and adapted to every weak point in local governance.\n\nThe political transition inside Russia, the shock of institutional reshuffling, and fractured control over cross-border logistics created a window that criminal networks exploited with ruthless speed. Entire supply chains have shifted from improvised trafficking to industrial-scale movement. Along railway hubs and highway chokepoints, law-enforcement units report a surge in seizures, but the volume keeps rising. Every intercepted convoy now implies several that passed unseen.\n\nInside the country, the consequences are no longer abstract statistics. Provincial hospitals report escalating overdose cases, municipal policing budgets are overstretched, and black-market finance is feeding extremist cells, gang recruitment, and local political bribery. Families bear the social collapse first; the state pays for it next. If left unchecked, this wave will corrode labor productivity, destabilize key regions, and erode public confidence in the new order faster than any foreign propaganda campaign.\n\nThe Security Council concludes that internal repression alone will not solve the crisis. Moscow must secure a direct arrangement with Afghan authorities and force corridor discipline through regional pressure. In practical terms, the state must complete the Afghan political track launched by §YMountains of Afghanistan§! and lock in a formal deal. Until that happens, the crisis mission will continue to escalate penalties in recurring cycles."
 russ.99.a:0 "Launch Emergency Anti-Narcotics Directive"
 russ.100.t:0 "Transit Corridor Under Narcotics Pressure"
 russ.100.desc:0 "The destabilization of Russian internal security after the Wagner takeover has had immediate spillover effects across Central Asian transit routes. Smuggling networks have expanded in speed and scale, using weak checkpoints, corrupt intermediaries, and fragmented enforcement practices to move Afghan narcotics through regional infrastructure.\n\nOur agencies warn that this is no longer a peripheral crime issue. The inflow is now affecting internal stability, expanding shadow finance, and increasing pressure on both border command and domestic policing. Unless corridor discipline is restored at the regional level, criminal leverage over politics and local economies will continue to grow."
 russ.100.a:0 "We must tighten control across the corridor"
 russ.101.t:0 "Afghanistan: Choose the Lever of Influence"
 russ.101.desc:0 "Reports from the Security Council, border command, and internal intelligence all point to the same conclusion: the southern narcotics corridor has become a strategic threat, not a policing problem. Convoys are adapting faster than local administrations can respond, middlemen are buying protection at every weak checkpoint, and the flow from Afghanistan through Central Asia is feeding criminal finance inside Russia at a scale that now touches labor stability, regional governance, and public order.\n\nMoscow can no longer rely on reactive seizures and emergency decrees alone. To break the system, Russia must establish direct leverage at its source - with whichever Afghan force can actually enforce discipline on roads, depots, and mountain routes, and can punish those who violate corridor controls.\n\nTwo channels are open. The first is the Taliban route: blunt, coercive, and often operationally immediate. The second is the official government route: institution-based, diplomatically legible, and potentially more sustainable if enforcement capacity holds. In both cases, Russia offers military support in exchange for hard anti-trafficking commitments, monitored implementation, and political accountability.\n\nThis decision defines the next stage of Wagner Russia's southern strategy. If the chosen side accepts, we can dismantle the crisis cycle at its source. If the deal fails, Russia will be forced into a costly domestic containment model that protects the state in the short term while draining stability and economic flexibility over the long term."
 russ.101.a:0 "Open channel to the Taliban"
 russ.101.b:0 "Back the official Afghan government"
 russ.102.t:0 "Russian Support Proposal: Taliban Channel"
 russ.102.desc:0 "A high-priority Russian channel has delivered an offer through Wagner intermediaries: immediate military support in exchange for enforceable anti-trafficking cooperation across key Afghan transit routes. Moscow demands real operational action - checkpoint discipline, convoy interdiction, suppression of broker networks, and direct pressure on corridors feeding narcotics north through Central Asia.\n\nThe Russian side is explicit: this is not symbolic diplomacy. The arrangement is designed as a security contract with measurable outcomes. If accepted, Taliban command structures would receive weapons, support equipment, and trained military cadres to stabilize force posture in critical sectors.\n\nFor your leadership, the proposal is both opportunity and commitment. It offers rapid material reinforcement and a strategic relationship with Wagner Russia, but it also binds your authority to corridor enforcement under close political scrutiny. Acceptance strengthens your coercive capacity and external backing; refusal preserves full autonomy but leaves the Russian channel searching for alternative, potentially hostile, methods of containment."
 russ.102.a:0 "Accept Russian support and enforce corridor control"
 russ.102.b:0 "Reject the proposal"
 russ.103.t:0 "Russian Support Proposal: Government Channel"
 russ.103.desc:0 "Moscow has issued a formal strategic proposal to the Afghan government under the banner of anti-narcotics stabilization. The Russian terms require enforceable corridor control: sustained seizures, disruption of trafficking finance, pressure on protected intermediaries, and coordinated operations on transit nodes linked to the Central Asian route.\n\nUnlike previous declarative memoranda, this package is designed as a practical enforcement partnership. If accepted, the government will receive direct military shipments and battle-ready cadres intended to reinforce pressure capacity in vulnerable sectors where local structures remain overstretched.\n\nFor Kabul, this is a high-stakes choice. Acceptance offers immediate material reinforcement, stronger control instruments, and a new axis of leverage with Wagner-led Russia. Refusal preserves policy independence and diplomatic distance, but may forfeit strategic support at a moment when regional trafficking networks are consolidating and political pressure is rising on every side."
 russ.103.a:0 "Accept the arrangement"
 russ.103.b:0 "Decline Russian terms"
 russ.104.t:0 "Afghan Deal Secured"
 russ.104.desc:0 "The Afghan side has accepted Moscow's terms. A real corridor-control mechanism is now active: transit chokepoints are being tightened, broker channels are under coordinated pressure, and local enforcement structures have committed to sustained disruption of northbound narcotics routes.\n\nFor Wagner Russia, this is not merely a diplomatic headline. It is a structural security gain. The state has converted external leverage into internal stabilization, reducing the need for endlessly expanding domestic emergency controls and proving that strategic agreements can outperform pure reactive repression.\n\nThe immediate consequence is operational: the recurring narcotics-crisis cycle can be terminated, accumulated pressure modifiers can be lifted, and regional administrations in Central Asia can begin de-escalating from emergency footing. Politically, the message is clear - Russia can impose order beyond its borders when national resilience demands it."
 russ.104.a:0 "The corridor is finally under pressure"
 russ.105.t:0 "Afghan Channel Failed"
 russ.105.desc:0 "The Afghan channel has failed. No faction accepted a binding anti-trafficking framework under Russian terms, leaving Moscow without a reliable enforcement partner at the source of the corridor.\n\nThis closes the diplomatic route and forces a hard internal pivot. From this point forward, containment depends on administrative emergency measures: expanded inspections, intensified domestic policing, permanent anti-smuggling bureaucracy, and stricter economic controls imposed across vulnerable sectors.\n\nThe state can stop the recurring crisis loop, but not for free. Without external disruption at the source, Russia must absorb long-term internal costs in civilian economy and social stability. In strategic terms, this is damage control - order is preserved, but at a structural price that will weigh on governance for years."
 russ.105.a:0 "Contain it internally, whatever the cost"
 russ.106.t:0 "Regional Corridor Pressure Recedes"
 russ.106.desc:0 "Following the new Russian-Afghan enforcement arrangement, trafficking patterns across major transit corridors have shifted. Pressure on key crossings has eased, large-volume routes are being disrupted more consistently, and the immediate expansion trend of narcotics flow has been contained.\n\nRegional administrations can now begin stepping down from full emergency posture and return to a stabilized border-control routine. The structural risk remains, but the acute wave that threatened to overwhelm local systems is receding."
 russ.106.a:0 "Stand down from emergency footing"
 russ.107.t:0 "Russian Offer: Strategic Aid Before the American War"
 russ.107.desc:0 "A direct offer has arrived from Wagner-led Russia. Moscow proposes immediate military support before open confrontation with the United States reaches full intensity. The package is concrete and large: rifles, support gear, artillery, and combat-ready Wagner formations to stiffen front-line cohesion and accelerate mobilization.\n\nThe Kremlin frames this as a strategic anti-American partnership: Iraq holds the line in the Middle East while Russia builds a forward geopolitical bulwark against U.S. influence. Acceptance would rapidly strengthen Iraqi military endurance and anchor a deeper relationship with Moscow. Refusal preserves distance, but at the cost of losing timely reinforcement at a dangerous moment."
 russ.107.a:0 "Accept Russian support package"
 russ.107.b:0 "Decline and remain independent"
 russ.108.t:0 "Iraq Accepted Our Military Support"
 russ.108.desc:0 "Baghdad has accepted Wagner Russia's pre-war aid package. Iraqi command structures are now reinforced with Russian materiel and newly formed veteran-capable units, creating a stronger anti-American defensive posture in the region.\n\nPolitically, this secures a valuable Middle Eastern partner and demonstrates that Moscow can translate expeditionary influence into concrete strategic alignment."
 russ.108.a:0 "A strong bulwark is taking shape"
 russ.109.t:0 "Additional Russian Shipment Arrived"
 russ.109.desc:0 "A new shipment from Wagner Russia has reached Iraqi depots. The delivery includes §G2500 infantry rifles§!, §G250 support equipment sets§!, and §G125 artillery pieces§!, allocated for immediate distribution to active formations and reserve brigades preparing for sustained confrontation.\n\nMoscow's message is clear: this is not symbolic solidarity, but structured military backing designed to strengthen Iraqi staying power and deepen long-term strategic coordination against U.S. pressure in the region."
 russ.109.a:0 "Distribute supplies to active commands"
 russ.110.t:0 "Russian Offer: Wagner Support for Libya"
 russ.110.desc:0 "Moscow has presented a strategic arrangement through Wagner channels. Russia offers to expand direct military support and deploy additional Wagner assault formations to stabilize the Libyan theater, harden regime security, and secure key infrastructure around ports, logistics routes, and energy nodes.\n\nIn exchange, Russia expects long-term economic concessions and privileged influence over strategic sectors. The proposal is framed as a sovereignty partnership against Western pressure: Libya gains immediate security strength, while Russia consolidates durable access and geopolitical depth on the Mediterranean flank.\n\nAcceptance would move Libya into deeper Wagner-aligned military and economic integration. Refusal preserves greater autonomy, but risks losing a powerful external security backer at a volatile moment."
 russ.110.a:0 "Accept Russian terms and deepen partnership"
 russ.110.b:0 "Reject economic concessions"
 
