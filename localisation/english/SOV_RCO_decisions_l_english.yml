 SOV_wag_africa_presence_car_desc:0 "Send a Stage I security proposal to §Ythe Central African Republic§!.\n\n§YIf accepted§!:\n- CAR receives Wagner Presence I\n- Russia gains §Gmajor opinion improvement§!\n- Unlocks CAR's §RStage II§! deal path"
 SOV_wag_africa_econ_car:0 "§RCentral African Republic: Expand Economic-Security Pact§!"
 SOV_wag_africa_econ_car_desc:0 "Offer §Ythe Central African Republic§! a Stage II economic-security pact.\n\n§YIf accepted§!:\n- Russia: §G-3% Consumer Goods§!\n- CAR: Wagner Presence II + Wagner Sphere alignment\n- §GMajor mutual opinion boost§!"
