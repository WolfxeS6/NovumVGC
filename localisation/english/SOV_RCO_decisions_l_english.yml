POL_capture_east_russia_mission_desc:0 "Our society is not ready for the prolonged war. So, we are on a limited time. Polish armed forces must strike a decisive blow to Red Army, than we can negotiate a favorible peace."
RCO_pol_capture_east_russia_mission:0 "Soviet-Polish War"
RCO_pol_capture_east_russia_mission_desc:0 "Polish society is not ready for a prolonged war. If we can hold key cities (Smolensk, Gomel and Kiev) for long enough, Polish side will not have other choice but to sign peace with us."
