  SOV_wag_infrastructure_concern_1:0 "Russian Railway Networks"
  SOV_wag_infrastructure_concern_1_desc:0 "A coordinated railway and infrastructure authority focused on rebuilding internal logistics arteries and improving supply-node construction speed."
  SOV_wag_infrastructure_concern_2:0 "Russian Railway Networks"
  SOV_wag_infrastructure_concern_2_desc:0 "A supply-priority expansion model of the railway network with aggressive focus on fast supply hub buildout."
  SOV_wag_infrastructure_concern_3:0 "Russian Railway Networks"
  SOV_wag_infrastructure_concern_3_desc:0 "A deep-reach logistics model that trades hub construction emphasis for stronger infrastructure expansion and extended supply reach."
  SOV_wag_military_industry_concern_1:0 "Military Industrial Complex"
  SOV_wag_military_industry_concern_1_desc:0 "A centralized command structure over core defense industries. It prioritizes output and scale across the military production base."
  SOV_wag_military_industry_concern_2:0 "Military Construction Company"
  SOV_wag_military_industry_concern_2_desc:0 "A contractor-led military construction model focused on rapid plant expansion and faster production-line startup performance."
  SOV_wag_military_industry_concern_3:0 "New Tankograd"
  SOV_wag_military_industry_concern_3_desc:0 "A specialized armored production doctrine focused on cheaper MBT and light mechanized output for sustained high-intensity operations."
  SOV_wag_civilian_industry_concern_1:0 "Russian Civilian Industry"
  SOV_wag_civilian_industry_concern_1_desc:0 "A civilian industrial concern focused on reducing consumer burden while improving civilian factory construction pace."
  SOV_wag_civilian_industry_concern_2:0 "Russian Civilian Industry"
  SOV_wag_civilian_industry_concern_2_desc:0 "An expanded civilian concern with stronger consumer-goods reduction and higher civilian construction throughput."
  SOV_wag_psyop_research_disruption:0 "Exposed Research Networks"
  SOV_drugsbad_idea:0 "Transit Narcotics Pressure"
  SOV_drugsbad_idea_desc:0 "Escalating trafficking from the Afghan direction is stressing border systems, distorting local economies, and feeding organized criminal structures across transit corridors."
  SOV_wag_psyop_research_disruption_desc:0 "Recent counterintelligence pressure disrupted procurement channels and technical exchange pipelines. Research institutions are operating under emergency constraints while recovery teams rebuild compromised access."
  SOV_wag_psyop_sanctions_blowback:0 "Sanctions-Evasion Blowback"
  SOV_wag_psyop_sanctions_blowback_desc:0 "A partially exposed sanctions-bypass route has forced emergency rerouting through costlier channels. Industrial supply and procurement remain functional, but at elevated short-term economic burden."
  SOV_wag_iran_trade_ties:0 "Russian-Iranian Trade Expansion"
  SOV_wag_iran_trade_ties_desc:0 "Trade corridors with Russia are temporarily expanded, easing domestic production burden through preferential logistics and energy-linked exchange."
  SOV_wag_trade_with_russia_prc:0 "Trade with Russia"
  SOV_wag_trade_with_russia_prc_desc:0 "A formal trade arrangement with Russia helps synchronize industrial planning and improves factory performance."
  SOV_wag_trade_with_russia_prc_advanced:0 "Expanded Trade with Russia"
  SOV_wag_trade_with_russia_prc_advanced_desc:0 "A deeper integration package with Russia improves industrial efficiency and unlocks broader construction momentum."
  SOV_wag_sanctions_shock:0 "Sanctions Shock Management"
  SOV_wag_sanctions_shock_desc:0 "Emergency confiscation, forced substitution, and rapid administrative intervention softened immediate sanctions damage, but at significant efficiency cost to the domestic economy."
  SOV_wag_afghan_drug_crisis_1:0 "Afghan Drug Corridor Pressure"
  SOV_wag_afghan_drug_crisis_1_desc:0 "Narcotics flows from the Afghan direction are rising, stressing social order and increasing hidden domestic costs."
  SOV_wag_afghan_drug_crisis_2:0 "Escalating Afghan Drug Inflow"
  SOV_wag_afghan_drug_crisis_2_desc:0 "Transit networks are adapting faster than enforcement, amplifying social destabilization and widening economic burden."
  SOV_wag_afghan_drug_crisis_3:0 "Systemic Narcotics Destabilization"
  SOV_wag_afghan_drug_crisis_3_desc:0 "A chronic narcotics surge now undermines governance, drains political capacity, and compounds domestic instability."
