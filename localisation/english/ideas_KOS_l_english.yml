l_english:
the_kosovo_war:0 "The Kosovo War"
the_kosovo_war_desc:0 "The Kosovo War Was Not Merely A War Over Land, It Was A Fight For The Rights Of The Albanian People In Kosovo, Who Could Not See A Bright Light At The End Of The Tunnel, How Could They, When That Light Had Been Extinguished Long Ago? Following Tito’s Death, Oppression Intensified, With The Massacre Of Albanians By The Dictator Slobodan Milošević Becoming A Regular Occurrence In Yugoslavia. Ibrahim Rugova Sought Peace Through Nonviolence, Yet It Seemed Serbian Forces Had Forgotten What Peace Meant, As They Responded With Ethnic Cleansing, Massacres, And The Destruction Of Villages.
The Albanians Were Ultimately Forced To Take Up Arms Against Serbian Forces, Leading To The Formation Of The Kosovo Liberation Army (KLA) In 1996. The KLA Could No Longer Stand By And Watch Their People Suffer Through A Humanitarian Catastrophe. Rising Against Serbia, The KLA Engaged In Numerous Battles, Many Of Which They Won. NATO’s Intervention In Kosovo Soon Followed, With A 78-Day Air Bombing Campaign Known As Operation Allied Force Which Sought To Destroy Serbian Air Defense Systems, Command And Control Facilities Etc Etc, Beginning On 24 March 1999 And Ending On 10 June 1999. This Campaign Marked The End Of The Kosovo War With The Victors Being The Opressed Albanians, As Serbian Forces Were Compelled To Retreat From Kosovo Under The Terms Of The Kumanovo Agreement."
kosovo_war:0 "Kosovo War Aftermath"
kosovo_war_desc:0 "The Kosovo War Has And Will Have Lasting Consequences On Our Country, From Active Mines To Burned Houses, The List Goes On And On, It Will Take A Long Time Before We Get Back On Track, But We Will"
albanians_massacre:0 "Massacre Of Albanians"
albanians_massacre_desc:0 "Yugoslav War Crimes During The Kosovo War Involved Widespread Massacres Of Kosovo Albanians, Carried Out By The Serbian Police, Yugoslav Army, And Paramilitary Forces Under The Direction Of Slobodan Milošević’s Government. These Massacres Were Part Of A Systematic Campaign Of Ethnic Cleansing Aimed At Expelling The Albanian Population From Kosovo"
displaced_albanians:0 "Displaced Albanians"
displaced_albanians_desc:0 "There Are Many Displaced Albanians, In North Macedonia And Serbia Especially, We Must Try And Bring Them Back"
destroyed_infastructure:0 "Destroyed Infrastructure"
destroyed_infastructure_desc:0 "Following The 1999 Kosovo War, Our Country's Infrastructure Was Severely Damaged, With Roads, Bridges, Hospitals, Schools, And Industrial Plants Destroyed Or Damaged By Both Conflict And NATO Airstrikes. Key Infrastructure Such As Water Supply Systems, Telecommunications, And Power Plants Were Significantly Disrupted, The Destruction Included Over 33 Hospitals, 344 Schools, And 144 Major Industrial Plants"
no_army:0 "No Army"
no_army_desc:0 "Following The End Of The Kosovo War, The Main Army Of Kosovo, The Kosovo Liberation Army (KLA) Was Disbanded, And The Kosovo Force (KFOR) Which Is A NATO-led International Peacekeeping Mission Was Deployed On June 12 1999 To Ensure Stability In The Country. Though We Must Push For Our Own Army In The Future"