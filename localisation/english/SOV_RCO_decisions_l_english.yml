SOV_bop_wagner_create_troll_factory_dec:0 "Wagner Troll Factory"
SOV_bop_wagner_create_troll_factory_dec_desc:0 "The battlefield is no longer only fought with rifles and tanks. It is waged in minds, on screens, and through carefully placed words. By organizing information brigades—our so-called 'troll factories'—we shape the narrative, sow doubt among our enemies, and rally patriots to our cause. Every post, every article, every whisper in the digital ether brings us closer to dominance."
SOV_bop_wagner_get_army_veterans_dec:0 "§RRecruit More Veterans§!"
SOV_bop_wagner_get_army_veterans_dec_desc:0 "\n§YThis decision is essential§!\n\nThe collapse of the Soviet Union left behind a generation of trained men—warriors of Chechnya, Afghanistan, and forgotten fronts—abandoned by the state they served. For them, the barracks are gone, but the call to arms remains. Wagner offers them not only pay, but purpose. In our ranks, they will find brotherhood once again."
SOV_bop_wagner_blame_mo_for_failiures_dec:0 "§RBlame Defence Ministry for Failures§!"
SOV_bop_wagner_blame_mo_for_failiures_dec_desc:0 "\n§YThis decision is essential§!\n\nEvery misstep of the generals in Moscow is an opportunity for us. When the Defence Ministry stumbles, when soldiers are sent unprepared, when victories are squandered—our voice must be the loudest in pointing the finger. The people will see who fights for Russia’s honor and who hides behind polished desks."
SOV_bop_wagner_start_musicians_trend_dec:0 "§RMusicians Trend§!"
SOV_bop_wagner_start_musicians_trend_dec_desc:0 "\n§YThis decision is essential§!\n\nWagner is more than a name—it is a symbol. To the public, our fighters are 'musicians,' playing their part in the grand symphony of Russia’s destiny. By spreading this image through culture and slang, we turn mercenaries into folk heroes, and war into an art form. Soon, every young man will dream of joining the orchestra."
SOV_bop_wagner_promote_prowagner_agenda_dec:0 "Promote pro-Wagner Agenda"
SOV_bop_wagner_promote_prowagner_agenda_dec_desc:0 "From talk shows to military forums, from taverns to parliaments—our message must resonate: Wagner stands for strength, loyalty, and Russia’s future. Through speeches, pamphlets, and carefully placed allies, we will push the idea that without Wagner, the Motherland is weak. With Wagner, she is invincible."
SOV_bop_wagner_final_mutiny_preps_dec:0 "§RFinal Preparations§!"
SOV_bop_wagner_final_mutiny_preps_dec_desc:0 "\n§YThis decision is essential§!\n\nThe time of patience is ending. We have gathered men, weapons, and influence. The state rots from within, its leaders complacent and blind. Our columns are ready, our allies silent but waiting. Soon, every step we take will shake Moscow’s walls. Final preparations must be completed—once we march, there is no return."
 SOV_bop_wagner_declare_mutiny_dec:0 "§RDeclare Mutiny§!"
 SOV_bop_wagner_declare_mutiny_dec_desc:0 "\n§YThis decision is essential§!\n\nThe order is given. The die is cast. Our banners are raised, our convoys roll forward. No more whispers, no more half-measures. Wagner steps out of the shadows to challenge those who betrayed the fighting man. Let them call it rebellion—we call it justice. The mutiny begins, and Russia will remember this day.!"
 SOV_wagner_state_desicions_category:0 "Directives of the Wagner State"
 SOV_wagner_state_desicions_category_desc:0 "Moscow has fallen silent under new masters, but the struggle for control has only begun. The Wagner state is held together by force, discipline, and constant pressure against enemies at home and abroad. Every campaign here is a test of authority: meet deadlines, enforce loyalty, and turn chaos into momentum before rivals recover.\n\nThrough this command panel, we issue strategic directives that shape the regime's survival. Internal missions harden the state apparatus, while external operations strike at hostile powers through deniable pressure, psychological warfare, and political intimidation. Success strengthens our grip and fuels expansion; failure invites resistance, fractures command, and exposes weakness to the world."
 SOV_wagner_state_missions_category:0 "Directives of the Wagner State"
 SOV_wagner_state_missions_category_desc:0 "Moscow has fallen silent under new masters, but the struggle for control has only begun. The Wagner state is held together by force, discipline, and constant pressure against enemies at home and abroad. Every campaign here is a test of authority: meet deadlines, enforce loyalty, and turn chaos into momentum before rivals recover.\n\nThrough this command panel, we issue strategic directives that shape the regime's survival. Internal missions harden the state apparatus, while external operations strike at hostile powers through deniable pressure, psychological warfare, and political intimidation. Success strengthens our grip and fuels expansion; failure invites resistance, fractures command, and exposes weakness to the world."
 SOV_wag_military_buildup_mission:0 "§RMilitary Buildup Program§!"
 SOV_wag_military_buildup_mission_desc:0 "Deadline: §Y360 days§!\n\nRequirements on deadline:\n- At least §Y1,000,000§! army manpower in the field\n- More than §Y79§! Military Factories\n\nSuccess: officer corps confidence and operational momentum improve.\nFailure: mobilization discipline weakens and political pressure rises."
 SOV_wag_security_consolidation_mission:0 "§RConsolidate Internal Security§!"
 SOV_wag_security_consolidation_mission_desc:0 "Deadline: §Y360 days§!\n\nRequirements on deadline:\n- Complete §YDigital Iron Curtain§!\n- Keep Stability above §Y85%§!\n\nSuccess: stronger counter-intelligence and political control.\nFailure: intelligence leaks, research slowdown, and stability loss."
 SOV_wag_economic_recovery_mission:0 "§RPrioritize Economy Growth§!"
 SOV_wag_economic_recovery_mission_desc:0 "Deadline: §Y240 days§!\n\nRequirements on deadline:\n- Complete either §YCorporate Economy§! or §YCommand Economy Model§!\n- Have more than §Y85§! total factories\n- Hire either §YYuri Borisov§! or §YAndrey Belousov§! as Political Advisor\n\nSuccess: better output and lower consumer burden.\nFailure: consumer goods and research penalties."
 SOV_wag_naval_rearmament_mission:0 "§RNaval Rearmament§!"
 SOV_wag_naval_rearmament_mission_desc:0 "Deadline: §Y300 days§!\n\nRequirements on deadline:\n- Complete §YNaval Facility§!\n- Complete either §YPacific Fleet Dockyards§! or §YNorthern Fleet Dockyards§!\n- Have at least §Y1 Carrier§! in active navy\n\nSuccess: naval modernization gains pace.\nFailure: confidence in maritime strategy declines."
 SOV_wag_terror_threat_mission:0 "§RPrevent Major Terror Attack§!"
 SOV_wag_terror_threat_mission_desc:0 "Deadline: §Y250 days§!\n\nOur security forces indicate a credible risk of a major terrorist attack during the regime transition.\n\nRequirements on deadline:\n- Complete §YNorth Caucasus Pacification§!\n- Complete §YControl Internal Affairs§!\n\nSuccess: the threat is neutralized and no incident occurs.\nFailure: §Y60%§! chance of a major terrorist attack event, §Y40%§! chance that no incident materializes."
 SOV_wag_afghan_drug_crisis_mission:0 "§RContain Afghan Narcotics Crisis§!"
 SOV_wag_afghan_drug_crisis_mission_desc:0 "Deadline cycle: §Y30 days§! (repeats until resolved)\n\nWhat began as scattered smuggling has turned into a hardened narcotics corridor from Afghanistan through Central Asia into Russian cities. Border seizures are rising, but so are overdose rates, criminal financing channels, and corruption pressure on regional administrations. Left unmanaged, the inflow will continuously degrade domestic resilience and manpower recovery.\n\n§YHow to stop escalation:§!\n- Strike a formal anti-trafficking arrangement with Afghan authorities (sets §YDeal with Afghan Government Struck§!)\n- In gameplay terms, complete the relevant Afghan diplomacy track opened by §YMountains of Afghanistan§!\n\n§RFailure every 30 days:§! the crisis spirit escalates one stage.\nEscalation cap: approximately §R-25% Stability§! and §R-1000 Weekly Manpower§!.\n\n§GSuccess condition met:§! mission ends and all accumulated narcotics-crisis debuffs are removed."
 SOV_wag_psyop_disinformation_us:0 "PsyOp: Fracture US Media Space"
  SOV_wag_psyop_disinformation_us_desc:0 "Deploy coordinated disinformation swarms, deepfake testimonies, and narrative shock content across US social media.\n\nMechanic overview:\n- Becomes available only after §YPsychological Operations§! focus\n- Triggers an immediate §YUS response event§! with counter-options\n- Shared PsyOps cooldown: §Y90 days§!\n\nSuccess chance: §Y60%§!\nFailure chance: §Y40%§!\n\nOn failure you take short political and stability hits, but no permanent structural debuffs."
 SOV_wag_psyop_tech_siphon_us:0 "PsyOp: Siphon US Military Tech Data"
  SOV_wag_psyop_tech_siphon_us_desc:0 "Run a mixed cyber-human infiltration operation against US subcontractor networks to extract practical military data and procurement intel.\n\nMechanic overview:\n- Triggers an immediate §YUS response event§! with counter-options\n- Shared PsyOps cooldown: §Y90 days§!\n\nSuccess chance: §Y45%§!\nFailure chance: §Y55%§!\n\nFailure backlash is temporary only:\n- §YExposed Research Networks§! for §Y90 days§! (§R-5% Research Speed§!)\nNo permanent research debuff is applied."
 SOV_wag_psyop_sanctions_blackmarket:0 "PsyOp: Black-Market Sanctions Evasion"
  SOV_wag_psyop_sanctions_blackmarket_desc:0 "Build proxy shell routes through smugglers, neutral brokers, and deniable financiers to bypass sanctions pressure.\n\nMechanic overview:\n- Triggers an immediate §YUS response event§! with counter-options\n- Shared PsyOps cooldown: §Y90 days§!\n\nSuccess chance: §Y50%§!\nFailure chance: §Y50%§!\n\nFailure backlash is temporary only:\n- §YSanctions-Evasion Blowback§! for §Y90 days§! (§R+3% Consumer Goods Factor§!)\nNo permanent consumer-goods debuff is applied."
 SOV_wag_dev_moscow_industrial_zone:0 "§GRebuild the Moscow Industrial Zone§!"
 SOV_wag_dev_moscow_industrial_zone_desc:0 "Concentrate labor battalions and contractor networks around the capital to restore high-value industry fast. Costly, but it immediately improves both civilian and military output."
 SOV_wag_dev_ural_heavy_industry:0 "§GExpand Ural Heavy Industry§!"
 SOV_wag_dev_ural_heavy_industry_desc:0 "Push another wave of industrial concentration into the Urals. Steel, machine production, and defense assembly lines will be expanded under emergency directives."
 SOV_wag_dev_volga_transport_grid:0 "§GModernize the Volga Transport Grid§!"
 SOV_wag_dev_volga_transport_grid_desc:0 "Upgrade key Volga corridors to reduce internal bottlenecks and accelerate military deliveries. Better logistics now means faster mobilization later. On completion: §Y-1%§! Consumer Goods Factor."
 SOV_wag_dev_siberian_extraction_corridor:0 "§GSiberian Extraction Corridor§!"
 SOV_wag_dev_siberian_extraction_corridor_desc:0 "Invest in road and rail access to remote resource regions, then tie extraction directly to central procurement systems."
 SOV_wag_dev_black_sea_ports:0 "§GFortify Black Sea Industrial Ports§!"
 SOV_wag_dev_black_sea_ports_desc:0 "Expand dockyards and connected infrastructure to support maritime production, resupply, and strategic redeployment."
 SOV_wag_dev_national_railway_push:0 "§GNational Railway Push§!"
 SOV_wag_dev_national_railway_push_desc:0 "A state-directed effort to patch rail bottlenecks, improve internal movement, and secure a reserve truck pool for fast logistics shifts."
 SOV_wag_dev_arsenal_dispersion:0 "§GDisperse New Arsenal Clusters§!"
 SOV_wag_dev_arsenal_dispersion_desc:0 "Build additional military plants outside obvious strike zones to improve resilience and sustained wartime output."
 SOV_wag_dev_civilian_reconstruction_directive:0 "§GCivilian Reconstruction Directive§!"
 SOV_wag_dev_civilian_reconstruction_directive_desc:0 "Rebuild civilian economic capacity in priority regions to stabilize long-term growth and reduce structural shortages."
 SOV_wag_dev_west_siberian_oil_belt:0 "§GDevelop the West Siberian Oil Belt§!"
 SOV_wag_dev_west_siberian_oil_belt_desc:0 "Concentrate drilling, pipeline links, and rail-serviced logistics across Western Siberia to secure a larger domestic oil base for the long war."
 SOV_wag_dev_ural_mining_cluster:0 "§GExpand the Ural Mining Cluster§!"
 SOV_wag_dev_ural_mining_cluster_desc:0 "Open new extraction lines in the Urals and modernize processing nodes to increase strategic metals output for heavy industry and defense production."
 SOV_wag_dev_lower_volga_refining_chain:0 "§GBuild the Lower Volga Refining Chain§!"
 SOV_wag_dev_lower_volga_refining_chain_desc:0 "Integrate petrochemical and refining facilities in the Lower Volga corridor to improve fuel security and synthetic material output."
 SOV_wag_adopt_infrastructure_concern:0 "§CEstablish Russian Railway Networks§!"
 SOV_wag_adopt_infrastructure_concern_desc:0 "Launch a centralized rail and infrastructure authority as the backbone of wartime logistics.\n\n§ROnly one Industrial Concern can be active at the same time.§!\n\nCurrent concern effects:\n- §Y+20%§! Infrastructure construction speed\n- §Y+10%§! Supply hub construction speed\n\nUpgrade options:\n- §YHub Priority (Tier II):§! +20% Infrastructure speed, +50% Supply hub speed\n- §YRange Priority (Tier III):§! +40% Infrastructure speed, +10% Supply hub speed, +30% Supply range"
 SOV_wag_upgrade_infrastructure_concern_2:0 "§CUpgrade Railway Networks: Hub Priority§!"
 SOV_wag_upgrade_infrastructure_concern_2_desc:0 "Prioritize high-speed supply hub construction while maintaining infrastructure expansion.\n\n§ROnly one Industrial Concern can be active at the same time.§!"
 SOV_wag_upgrade_infrastructure_concern_3:0 "§CUpgrade Railway Networks: Range Priority§!"
 SOV_wag_upgrade_infrastructure_concern_3_desc:0 "Shift to a long-range logistics model with stronger infrastructure growth and extended supply reach.\n\n§ROnly one Industrial Concern can be active at the same time.§!"
 SOV_wag_adopt_military_industry_concern:0 "§CEstablish Military Industry Concern§!"
 SOV_wag_adopt_military_industry_concern_desc:0 "Create a centralized military production concern to synchronize plant construction and scale wartime output.\n\n§ROnly one Industrial Concern can be active at the same time.§!\n\nCurrent concern effects:\n- §Y+7%§! Production output\n\nUpgrade branches (both are Tier II and mutually exclusive):\n- §YMilitary Construction Company (Tier II):§! +7% Production output, +7% Military factory construction speed, +5% Base production efficiency cap\n- §YNew Tankograd (Tier II):§! +7% Production output, -10% Main battle tank production cost, -5% Light mechanized production cost"
 SOV_wag_upgrade_military_industry_concern:0 "§CUpgrade to Military Construction Company§!"
 SOV_wag_upgrade_military_industry_concern_desc:0 "Shift from centralized output management to a construction-heavy military company model, accelerating new military factory buildout and improving base line efficiency.\n\n§ROnly one Industrial Concern can be active at the same time.§!"
 SOV_wag_upgrade_military_industry_tankograd:0 "§CUpgrade to New Tankograd§!"
 SOV_wag_upgrade_military_industry_tankograd_desc:0 "Reconfigure the concern into an armored specialization program focused on reducing MBT and light mechanized production cost. This is the alternative §YTier II§! branch to Military Construction Company.\n\n§ROnly one Industrial Concern can be active at the same time.§!"
 SOV_wag_adopt_civilian_industry_concern:0 "§CEstablish Russian Civilian Industry§!"
 SOV_wag_adopt_civilian_industry_concern_desc:0 "Create a civilian-focused concern to lower consumer goods burden and speed up civilian factory construction.\n\n§ROnly one Industrial Concern can be active at the same time.§!\n\nCurrent concern effects:\n- §Y-5%§! Consumer goods factor\n- §Y+5%§! Civilian factory construction speed\n\nUpgrade option:\n- §YRussian Civilian Industry (Tier II):§! -10% Consumer goods factor, +10% Civilian factory construction speed"
 SOV_wag_upgrade_civilian_industry_concern:0 "§CUpgrade Russian Civilian Industry§!"
 SOV_wag_upgrade_civilian_industry_concern_desc:0 "Expand the concern for deeper consumer-goods reduction and stronger civilian construction growth.\n\n§ROnly one Industrial Concern can be active at the same time.§!"
 SOV_wagner_integration_category:0 "Wagner Integration Directives"
 SOV_wagner_integration_category_desc:0 "The outer sphere is secured, but these territories remain politically fragile. Integration is possible only after deep occupation control. Each directive requires §Y80% compliance in all relevant states§! and full ownership/control."
 SOV_wagner_africa_campaigns_category:0 "The Far Destination"
 SOV_wagner_africa_campaigns_category_desc:0 "After securing long-range expeditionary capacity, Wagner can build influence in Africa through staged security partnerships. First comes limited military presence and adviser deployment; second comes deeper economic-security integration.\n\nIf accepted, local partners gain stronger internal military capability, while Russia gains strategic leverage and economic returns."
 SOV_wagner_africa_desicions_category:0 "The Far Destination"
 SOV_wagner_africa_desicions_category_desc:0 "With long-range expeditionary capability secured, Wagner can project Russian influence across Africa and the wider southern arc through a two-stage doctrine.\n\n§YStage I§!: security entry - advisers, instructors, and limited military presence.\n§YStage II§!: economic-security consolidation - deeper military footprint, privileged contracts, and strategic resource access.\n\nEach accepted agreement weakens Western influence networks and expands Russia's geopolitical leverage."
 SOV_wag_iraq_reinforcement_shipment:0 "§RIraq: Additional Arms Shipment§!"
 SOV_wag_iraq_reinforcement_shipment_desc:0 "Dispatch an additional structured military shipment to §YIraq§! to sustain its anti-American war posture.\n\n§YEffects§!:\n- Iraq receives §G2500 Infantry Equipment§!, §G250 Support Equipment§!, §G125 Artillery§!\n- §YIraq is notified by event§!\n- Reinforces long-term Russian strategic influence in the Iraqi theater"
 SOV_wag_africa_presence_mli:0 "§YMali§!: Offer Wagner Military Presence"
 SOV_wag_africa_presence_mli_desc:0 "Send a Stage I security proposal to §YMali§!.\n\n§YIf accepted§!:\n- Mali receives Wagner Presence I\n- Russia gains §Gmajor opinion improvement§!\n- Unlocks Mali's §RStage II§! deal path"
 SOV_wag_africa_econ_mli:0 "§RMali: Expand Economic-Security Pact§!"
 SOV_wag_africa_econ_mli_desc:0 "Offer §YMali§! a Stage II economic-security pact.\n\n§YIf accepted§!:\n- Russia: §G-3% Consumer Goods§!\n- Mali: Wagner Presence II + Wagner Sphere alignment\n- §GMajor mutual opinion boost§!"
 SOV_wag_africa_presence_vol:0 "§YBurkina Faso§!: Offer Wagner Military Presence"
 SOV_wag_africa_presence_vol_desc:0 "Send a Stage I security proposal to §YBurkina Faso§!.\n\n§YIf accepted§!:\n- Burkina Faso receives Wagner Presence I\n- Russia gains §Gmajor opinion improvement§!\n- Unlocks Burkina Faso's §RStage II§! deal path"
 SOV_wag_africa_econ_vol:0 "§RBurkina Faso: Expand Economic-Security Pact§!"
